<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#fffbeb" rx="16"/>
  <text x="400" y="40" fill="#111827" font-size="22" font-weight="bold" text-anchor="middle">How Academic AI Detection Works — 3 Steps</text>
  <defs><marker id="aarr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker></defs>
  <!-- Step 1 -->
  <rect x="40" y="70" width="220" height="280" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="150" cy="110" r="35" fill="#f59e0b"/>
  <text x="150" y="120" fill="#fff" font-size="28" font-weight="bold" text-anchor="middle">1</text>
  <text x="150" y="175" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Paste &amp; Select</text>
  <text x="150" y="200" fill="#6b7280" font-size="12" text-anchor="middle">Submit your academic text and</text>
  <text x="150" y="218" fill="#6b7280" font-size="12" text-anchor="middle">choose document type:</text>
  <text x="150" y="250" fill="#f59e0b" font-size="11" text-anchor="middle">Journal Article</text>
  <text x="150" y="268" fill="#f59e0b" font-size="11" text-anchor="middle">Thesis • Dissertation</text>
  <text x="150" y="286" fill="#f59e0b" font-size="11" text-anchor="middle">Lab Report • Research Paper</text>
  <!-- Arrow 1 -->
  <path d="M260 180 L290 180" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#aarr)"/>
  <!-- Step 2 -->
  <rect x="290" y="70" width="220" height="280" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="400" cy="110" r="35" fill="#f59e0b"/>
  <text x="400" y="120" fill="#fff" font-size="28" font-weight="bold" text-anchor="middle">2</text>
  <text x="400" y="175" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">AI Analysis</text>
  <text x="400" y="200" fill="#6b7280" font-size="12" text-anchor="middle">Our multi-layer model analyzes</text>
  <text x="400" y="218" fill="#6b7280" font-size="12" text-anchor="middle">linguistic patterns, vocabulary,</text>
  <text x="400" y="236" fill="#6b7280" font-size="12" text-anchor="middle">sentence structure and flow.</text>
  <text x="400" y="268" fill="#f59e0b" font-size="11" text-anchor="middle">Cross-referenced against</text>
  <text x="400" y="286" fill="#f59e0b" font-size="11" text-anchor="middle">Turnitin, GPTZero,</text>
  <text x="400" y="304" fill="#f59e0b" font-size="11" text-anchor="middle">Copyleaks databases</text>
  <!-- Arrow 2 -->
  <path d="M510 180 L540 180" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#aarr)"/>
  <!-- Step 3 -->
  <rect x="540" y="70" width="220" height="280" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="650" cy="110" r="35" fill="#059669"/>
  <text x="650" y="120" fill="#fff" font-size="28" font-weight="bold" text-anchor="middle">3</text>
  <text x="650" y="175" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Get Report</text>
  <text x="650" y="200" fill="#6b7280" font-size="12" text-anchor="middle">Receive a detailed report</text>
  <text x="650" y="218" fill="#6b7280" font-size="12" text-anchor="middle">with AI probability score,</text>
  <text x="650" y="236" fill="#6b7280" font-size="12" text-anchor="middle">highlighted sentences, and verdict.</text>
  <text x="650" y="268" fill="#059669" font-size="11" text-anchor="middle">✓ 99% Accuracy</text>
  <text x="650" y="286" fill="#059669" font-size="11" text-anchor="middle">✓ Field-specific analysis</text>
  <text x="650" y="304" fill="#059669" font-size="11" text-anchor="middle">✓ Actionable insights</text>
</svg>
