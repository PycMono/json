<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#faf5ff" rx="16"/>
  <text x="400" y="45" fill="#111827" font-size="22" font-weight="bold" text-anchor="middle">Who Needs an AI Humanizer for Professors?</text>
  <rect x="40" y="70" width="340" height="120" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="60" y="100" fill="#8b5cf6" font-size="28">🎓</text>
  <text x="95" y="100" fill="#111827" font-size="15" font-weight="bold">University Professors</text>
  <text x="60" y="125" fill="#6b7280" font-size="12">Humanize lecture notes, course materials,</text>
  <text x="60" y="142" fill="#6b7280" font-size="12">and academic presentations to sound natural</text>
  <text x="60" y="159" fill="#6b7280" font-size="12">and authentically authored.</text>
  <rect x="420" y="70" width="340" height="120" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="440" y="100" fill="#8b5cf6" font-size="28">🔬</text>
  <text x="475" y="100" fill="#111827" font-size="15" font-weight="bold">Researchers</text>
  <text x="440" y="125" fill="#6b7280" font-size="12">Transform AI-assisted research drafts into</text>
  <text x="440" y="142" fill="#6b7280" font-size="12">publication-ready manuscripts with authentic</text>
  <text x="440" y="159" fill="#6b7280" font-size="12">academic voice.</text>
  <rect x="40" y="210" width="340" height="120" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="60" y="240" fill="#8b5cf6" font-size="28">✉️</text>
  <text x="95" y="240" fill="#111827" font-size="15" font-weight="bold">Department Chairs</text>
  <text x="60" y="265" fill="#6b7280" font-size="12">Write professional emails, committee reports,</text>
  <text x="60" y="282" fill="#6b7280" font-size="12">and administrative communications that reflect</text>
  <text x="60" y="299" fill="#6b7280" font-size="12">your personal leadership style.</text>
  <rect x="420" y="210" width="340" height="120" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="440" y="240" fill="#8b5cf6" font-size="28">📝</text>
  <text x="475" y="240" fill="#111827" font-size="15" font-weight="bold">Teaching Assistants</text>
  <text x="440" y="265" fill="#6b7280" font-size="12">Create natural-sounding syllabi, assignment</text>
  <text x="440" y="282" fill="#6b7280" font-size="12">descriptions, and student feedback with a</text>
  <text x="440" y="299" fill="#6b7280" font-size="12">professional academic tone.</text>
  <rect x="40" y="350" width="340" height="120" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="60" y="380" fill="#8b5cf6" font-size="28">📊</text>
  <text x="95" y="380" fill="#111827" font-size="15" font-weight="bold">Academic Authors</text>
  <text x="60" y="405" fill="#6b7280" font-size="12">Prepare book chapters, review articles, and</text>
  <text x="60" y="422" fill="#6b7280" font-size="12">conference papers that pass AI detection</text>
  <text x="60" y="439" fill="#6b7280" font-size="12">while maintaining scholarly rigor.</text>
  <rect x="420" y="350" width="340" height="120" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="440" y="380" fill="#8b5cf6" font-size="28">💬</text>
  <text x="475" y="380" fill="#111827" font-size="15" font-weight="bold">Student Advisors</text>
  <text x="440" y="405" fill="#6b7280" font-size="12">Generate personalized, warm mentoring</text>
  <text x="440" y="422" fill="#6b7280" font-size="12">communications and constructive feedback</text>
  <text x="440" y="439" fill="#6b7280" font-size="12">that resonates with students.</text>
</svg>
