<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#be123c"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fecdd3"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="#fff1f2" rx="12"/>
  <text x="400" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">三步完成账号安全检查</text>

  <!-- Step 1 -->
  <rect x="40" y="70" width="210" height="280" rx="16" fill="white" filter="url(#sh)"/>
  <circle cx="145" cy="120" r="35" fill="#fff1f2"/>
  <text x="145" y="128" font-family="system-ui, sans-serif" font-size="32" text-anchor="middle">📧</text>
  <circle cx="70" cy="90" r="16" fill="url(#stepGrad)"/>
  <text x="70" y="96" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="145" y="180" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#0f172a" text-anchor="middle">输入邮箱地址</text>
  <text x="145" y="210" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">输入要检查的邮箱</text>
  <text x="145" y="230" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">支持任何邮箱地址</text>
  <text x="145" y="260" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">查询完全匿名安全</text>
  <rect x="95" y="285" width="100" height="32" rx="16" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="145" y="306" font-family="system-ui, sans-serif" font-size="11" fill="#be123c" text-anchor="middle">输入即查</text>

  <!-- Arrow 1 -->
  <path d="M260 210 L290 210" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M285 200 L295 210 L285 220" fill="none" stroke="#f43f5e" stroke-width="3" stroke-linecap="round"/>

  <!-- Step 2 -->
  <rect x="300" y="70" width="210" height="280" rx="16" fill="white" filter="url(#sh)"/>
  <circle cx="405" cy="120" r="35" fill="#fff1f2"/>
  <text x="405" y="128" font-family="system-ui, sans-serif" font-size="32" text-anchor="middle">🔍</text>
  <circle cx="330" cy="90" r="16" fill="url(#stepGrad)"/>
  <text x="330" y="96" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="405" y="180" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#0f172a" text-anchor="middle">扫描泄露数据库</text>
  <text x="405" y="210" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">比对600+泄露事件</text>
  <text x="405" y="230" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">显示泄露详情时间线</text>
  <text x="405" y="260" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">计算账号健康评分</text>
  <rect x="355" y="285" width="100" height="32" rx="16" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="405" y="306" font-family="system-ui, sans-serif" font-size="11" fill="#be123c" text-anchor="middle">秒级出结果</text>

  <!-- Arrow 2 -->
  <path d="M520 210 L550 210" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M545 200 L555 210 L545 220" fill="none" stroke="#f43f5e" stroke-width="3" stroke-linecap="round"/>

  <!-- Step 3 -->
  <rect x="560" y="70" width="210" height="280" rx="16" fill="white" filter="url(#sh)"/>
  <circle cx="665" cy="120" r="35" fill="#fef2f2"/>
  <text x="665" y="128" font-family="system-ui, sans-serif" font-size="32" text-anchor="middle">🛡️</text>
  <circle cx="590" cy="90" r="16" fill="#9f1239"/>
  <text x="590" y="96" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="665" y="180" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#0f172a" text-anchor="middle">获取安全建议</text>
  <text x="665" y="210" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">查看具体修复方案</text>
  <text x="665" y="230" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">生成新密码替代旧密码</text>
  <text x="665" y="260" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">导出完整检测报告</text>
  <rect x="615" y="285" width="100" height="32" rx="16" fill="#fef2f2" stroke="#fda4af" stroke-width="1"/>
  <text x="665" y="306" font-family="system-ui, sans-serif" font-size="11" fill="#9f1239" text-anchor="middle">立即加固</text>
</svg>