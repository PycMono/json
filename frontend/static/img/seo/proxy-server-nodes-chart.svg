<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#accent)"/>
  <!-- Title -->
  <text x="400" y="44" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e0e7ff" text-anchor="middle">Server Node Network</text>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Multi-region proxy nodes for optimal speed and reliability</text>
  <!-- Global nodes illustrated -->
  <rect x="60" y="90" width="160" height="140" rx="12" fill="url(#card-bg)" stroke="#334155"/>
  <text x="140" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="28" text-anchor="middle">🌍</text>
  <text x="140" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0e7ff" text-anchor="middle">Global Auto</text>
  <text x="140" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Nearest low-latency node</text>
  <text x="140" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">selected automatically</text>
  <rect x="80" y="195" width="120" height="8" rx="4" fill="#334155"/>
  <rect x="80" y="195" width="100" height="8" rx="4" fill="#22c55e"/>
  <text x="140" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">● Online</text>
  <rect x="240" y="90" width="160" height="140" rx="12" fill="url(#card-bg)" stroke="#334155"/>
  <text x="320" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="28" text-anchor="middle">🇺🇸</text>
  <text x="320" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0e7ff" text-anchor="middle">US Node</text>
  <text x="320" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">United States</text>
  <text x="320" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">East & West coast</text>
  <rect x="260" y="195" width="120" height="8" rx="4" fill="#334155"/>
  <rect x="260" y="195" width="96" height="8" rx="4" fill="#22c55e"/>
  <text x="320" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">● Online ~42ms</text>
  <rect x="420" y="90" width="160" height="140" rx="12" fill="url(#card-bg)" stroke="#334155"/>
  <text x="500" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="28" text-anchor="middle">🇪🇺</text>
  <text x="500" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0e7ff" text-anchor="middle">EU Node</text>
  <text x="500" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Europe (Frankfurt)</text>
  <text x="500" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">GDPR-compliant region</text>
  <rect x="440" y="195" width="120" height="8" rx="4" fill="#334155"/>
  <rect x="440" y="195" width="90" height="8" rx="4" fill="#22c55e"/>
  <text x="500" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">● Online ~38ms</text>
  <rect x="580" y="90" width="160" height="140" rx="12" fill="url(#card-bg)" stroke="#334155"/>
  <text x="660" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="28" text-anchor="middle">🌏</text>
  <text x="660" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0e7ff" text-anchor="middle">Asia Node</text>
  <text x="660" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Asia Pacific (Tokyo)</text>
  <text x="660" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Fast APAC connectivity</text>
  <rect x="600" y="195" width="120" height="8" rx="4" fill="#334155"/>
  <rect x="600" y="195" width="78" height="8" rx="4" fill="#f97316"/>
  <text x="660" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f97316" text-anchor="middle">● Online ~68ms</text>
  <!-- Performance stats -->
  <text x="60" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#94a3b8">Network Stats</text>
  <rect x="40" y="280" width="720" height="100" rx="12" fill="url(#card-bg)" stroke="#334155"/>
  <!-- Stats grid -->
  <text x="220" y="312" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="800" fill="#818cf8" text-anchor="middle">99.9%</text>
  <text x="220" y="332" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Uptime</text>
  <line x1="360" y1="295" x2="360" y2="365" stroke="#334155"/>
  <text x="500" y="312" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="800" fill="#22c55e" text-anchor="middle">AES-256</text>
  <text x="500" y="332" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Encryption</text>
  <line x1="640" y1="295" x2="640" y2="365" stroke="#334155"/>
  <text x="720" y="312" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="800" fill="#f59e0b" text-anchor="middle">0</text>
  <text x="720" y="332" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Logs Stored</text>
</svg>