<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#be123c"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#be123c"/>
      <stop offset="50%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#fff1f2" rx="12"/>
  <text x="400" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">重大数据泄露事件时间线</text>

  <!-- Timeline line -->
  <line x1="80" y1="90" x2="80" y2="400" stroke="url(#g2)" stroke-width="3" stroke-linecap="round"/>

  <!-- Breach 1: Yahoo 2013 -->
  <circle cx="80" cy="110" r="12" fill="#be123c"/>
  <text x="80" y="114" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">1</text>
  <rect x="105" y="85" width="660" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="125" y="108" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#be123c">Yahoo — 2013</text>
  <text x="280" y="108" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">30亿账号泄露，史上最大规模数据泄露</text>
  <rect x="580" y="95" width="160" height="28" rx="14" fill="#fef2f2"/>
  <text x="660" y="114" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#be123c" text-anchor="middle">🔴 Critical · 3B</text>

  <!-- Breach 2: LinkedIn 2021 -->
  <circle cx="80" cy="175" r="12" fill="#f43f5e"/>
  <text x="80" y="179" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">2</text>
  <rect x="105" y="150" width="660" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="125" y="173" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f43f5e">LinkedIn — 2021</text>
  <text x="290" y="173" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">7亿用户数据被 scraped 公开售卖</text>
  <rect x="580" y="160" width="160" height="28" rx="14" fill="#fff7ed"/>
  <text x="660" y="179" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ea580c" text-anchor="middle">🟠 High · 700M</text>

  <!-- Breach 3: Adobe 2013 -->
  <circle cx="80" cy="240" r="12" fill="#f43f5e"/>
  <text x="80" y="244" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">3</text>
  <rect x="105" y="215" width="660" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="125" y="238" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f43f5e">Adobe — 2013</text>
  <text x="280" y="238" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">1.53亿用户凭证和密码提示泄露</text>
  <rect x="580" y="225" width="160" height="28" rx="14" fill="#fff7ed"/>
  <text x="660" y="244" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ea580c" text-anchor="middle">🟠 High · 153M</text>

  <!-- Breach 4: Facebook 2021 -->
  <circle cx="80" cy="305" r="12" fill="#fb923c"/>
  <text x="80" y="309" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">4</text>
  <rect x="105" y="280" width="660" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="125" y="303" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ea580c">Facebook — 2021</text>
  <text x="295" y="303" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">5.33亿用户手机号和个人信息泄露</text>
  <rect x="580" y="290" width="160" height="28" rx="14" fill="#fefce8"/>
  <text x="660" y="309" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ca8a04" text-anchor="middle">🟡 Medium · 533M</text>

  <!-- Breach 5: Collection #1 2019 -->
  <circle cx="80" cy="370" r="12" fill="#fb923c"/>
  <text x="80" y="374" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">5</text>
  <rect x="105" y="345" width="660" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="125" y="368" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ea580c">Collection #1 — 2019</text>
  <text x="315" y="368" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">7.73亿邮箱 + 2200万密码合集</text>
  <rect x="580" y="355" width="160" height="28" rx="14" fill="#fefce8"/>
  <text x="660" y="374" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ca8a04" text-anchor="middle">🟡 Medium · 773M</text>

  <!-- Bottom note -->
  <text x="400" y="435" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">数据来源：Have I Been Pwned · 以上仅展示部分重大事件</text>
</svg>