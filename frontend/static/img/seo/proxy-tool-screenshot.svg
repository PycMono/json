<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="530" rx="16" fill="url(#bg)"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#accent)"/>
  <!-- Title -->
  <text x="400" y="48" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e0e7ff" text-anchor="middle">Anonymous Web Proxy</text>
  <text x="400" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Browse privately and securely — no installation required</text>
  <!-- URL Bar -->
  <rect x="80" y="95" width="640" height="52" rx="12" fill="#1e293b" stroke="#334155"/>
  <circle cx="108" cy="121" r="8" fill="none" stroke="#22c55e" stroke-width="2"/>
  <rect cx="108" cy="121" x="104" y="117" width="8" height="8" rx="4" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="122" y="126" font-family="monospace" font-size="14" fill="#94a3b8">https://</text>
  <text x="192" y="126" font-family="monospace" font-size="14" fill="#e0e7ff">example.com</text>
  <rect x="550" y="105" width="140" height="32" rx="8" fill="url(#accent)"/>
  <text x="620" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">🔍 Visit</text>
  <!-- Feature cards row -->
  <rect x="40" y="175" width="220" height="140" rx="12" fill="url(#card-bg)" stroke="#334155"/>
  <rect x="56" y="191" width="40" height="40" rx="10" fill="#4f46e5" opacity="0.2"/>
  <text x="76" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle" fill="#818cf8">🛡️</text>
  <text x="60" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0e7ff">Hide Real IP Address</text>
  <text x="60" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">Your IP stays hidden behind</text>
  <text x="60" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">our encrypted proxy servers</text>
  <rect x="290" y="175" width="220" height="140" rx="12" fill="url(#card-bg)" stroke="#334155"/>
  <rect x="306" y="191" width="40" height="40" rx="10" fill="#4f46e5" opacity="0.2"/>
  <text x="326" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle" fill="#818cf8">🔒</text>
  <text x="306" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0e7ff">Encrypted Connection</text>
  <text x="306" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">AES-256 encryption protects</text>
  <text x="306" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">all data in transit</text>
  <rect x="540" y="175" width="220" height="140" rx="12" fill="url(#card-bg)" stroke="#334155"/>
  <rect x="556" y="191" width="40" height="40" rx="10" fill="#4f46e5" opacity="0.2"/>
  <text x="576" y="217" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle" fill="#818cf8">⚡</text>
  <text x="556" y="248" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0e7ff">No Installation</text>
  <text x="556" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">Works directly in browser</text>
  <text x="556" y="283" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">no software downloads needed</text>
  <!-- Node status bar -->
  <text x="60" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Server Nodes</text>
  <rect x="40" y="360" width="170" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="64" y="384" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0e7ff">🌍 Global</text>
  <text x="64" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Auto Select</text>
  <rect x="64" y="404" width="100" height="4" rx="2" fill="#334155"/>
  <rect x="64" y="404" width="80" height="4" rx="2" fill="#22c55e"/>
  <rect x="230" y="360" width="170" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="254" y="384" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0e7ff">🇺🇸 US</text>
  <text x="254" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">United States</text>
  <rect x="254" y="404" width="100" height="4" rx="2" fill="#334155"/>
  <rect x="254" y="404" width="75" height="4" rx="2" fill="#22c55e"/>
  <rect x="420" y="360" width="170" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="444" y="384" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0e7ff">🇪🇺 EU</text>
  <text x="444" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Europe</text>
  <rect x="444" y="404" width="100" height="4" rx="2" fill="#334155"/>
  <rect x="444" y="404" width="70" height="4" rx="2" fill="#22c55e"/>
  <rect x="610" y="360" width="150" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="634" y="384" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0e7ff">🌏 Asia</text>
  <text x="634" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#94a3b8">Asia Pacific</text>
  <rect x="634" y="404" width="100" height="4" rx="2" fill="#334155"/>
  <rect x="634" y="404" width="60" height="4" rx="2" fill="#f97316"/>
  <!-- Stats -->
  <text x="60" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Real-time Stats</text>
  <rect x="40" y="465" width="350" height="48" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="72" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#818cf8">5,200+</text>
  <text x="180" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">requests today</text>
  <line x1="300" y1="475" x2="300" y2="503" stroke="#334155"/>
  <text x="330" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#818cf8">4</text>
  <text x="370" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">nodes online</text>
</svg>