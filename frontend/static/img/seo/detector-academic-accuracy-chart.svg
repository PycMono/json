<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#fffbeb" rx="16"/>
  <text x="400" y="40" fill="#111827" font-size="22" font-weight="bold" text-anchor="middle">Academic Detection Accuracy by Document Type</text>
  <!-- Bar chart -->
  <rect x="60" y="60" width="680" height="200" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="85" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Accuracy Rate (%)</text>
  <!-- Baseline -->
  <line x1="100" y1="250" x2="720" y2="250" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="254" fill="#6b7280" font-size="10" text-anchor="end">0%</text>
  <text x="90" y="204" fill="#6b7280" font-size="10" text-anchor="end">50%</text>
  <text x="90" y="154" fill="#6b7280" font-size="10" text-anchor="end">75%</text>
  <text x="90" y="104" fill="#6b7280" font-size="10" text-anchor="end">100%</text>
  <text x="90" y="68" fill="#6b7280" font-size="10" text-anchor="end">99%</text>
  <!-- Bars -->
  <rect x="110" y="108" width="70" height="142" fill="#f59e0b" rx="4"/>
  <text x="145" y="98" fill="#111827" font-size="11" font-weight="bold" text-anchor="middle">99%</text>
  <text x="145" y="270" fill="#6b7280" font-size="10" text-anchor="middle">Journal</text>
  <text x="145" y="282" fill="#6b7280" font-size="10" text-anchor="middle">Articles</text>
  <rect x="200" y="115" width="70" height="135" fill="#fbbf24" rx="4"/>
  <text x="235" y="105" fill="#111827" font-size="11" font-weight="bold" text-anchor="middle">97%</text>
  <text x="235" y="270" fill="#6b7280" font-size="10" text-anchor="middle">Theses</text>
  <rect x="290" y="120" width="70" height="130" fill="#f59e0b" rx="4"/>
  <text x="325" y="110" fill="#111827" font-size="11" font-weight="bold" text-anchor="middle">96%</text>
  <text x="325" y="270" fill="#6b7280" font-size="10" text-anchor="middle">Disserta-</text>
  <text x="325" y="282" fill="#6b7280" font-size="10" text-anchor="middle">tions</text>
  <rect x="380" y="112" width="70" height="138" fill="#fbbf24" rx="4"/>
  <text x="415" y="102" fill="#111827" font-size="11" font-weight="bold" text-anchor="middle">98%</text>
  <text x="415" y="270" fill="#6b7280" font-size="10" text-anchor="middle">Lab</text>
  <text x="415" y="282" fill="#6b7280" font-size="10" text-anchor="middle">Reports</text>
  <rect x="470" y="118" width="70" height="132" fill="#f59e0b" rx="4"/>
  <text x="505" y="108" fill="#111827" font-size="11" font-weight="bold" text-anchor="middle">96%</text>
  <text x="505" y="270" fill="#6b7280" font-size="10" text-anchor="middle">Research</text>
  <text x="505" y="282" fill="#6b7280" font-size="10" text-anchor="middle">Papers</text>
  <rect x="560" y="125" width="70" height="125" fill="#fbbf24" rx="4"/>
  <text x="595" y="115" fill="#111827" font-size="11" font-weight="bold" text-anchor="middle">95%</text>
  <text x="595" y="270" fill="#6b7280" font-size="10" text-anchor="middle">Reviews</text>
  <rect x="650" y="108" width="70" height="142" fill="#f59e0b" rx="4"/>
  <text x="685" y="98" fill="#111827" font-size="11" font-weight="bold" text-anchor="middle">99%</text>
  <text x="685" y="270" fill="#6b7280" font-size="10" text-anchor="middle">Confer-</text>
  <text x="685" y="282" fill="#6b7280" font-size="10" text-anchor="middle">ence</text>
  <!-- Stats -->
  <rect x="60" y="290" width="220" height="130" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="170" y="320" fill="#f59e0b" font-size="30" font-weight="bold" text-anchor="middle">99%</text>
  <text x="170" y="348" fill="#111827" font-size="13" text-anchor="middle">Peak Accuracy</text>
  <text x="170" y="375" fill="#6b7280" font-size="10" text-anchor="middle">Industry-leading precision</text>
  <rect x="300" y="290" width="220" height="130" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="410" y="320" fill="#059669" font-size="30" font-weight="bold" text-anchor="middle">5</text>
  <text x="410" y="348" fill="#111827" font-size="13" text-anchor="middle">Fields Supported</text>
  <text x="410" y="375" fill="#6b7280" font-size="10" text-anchor="middle">STEM, Humanities, Social, Medical</text>
  <rect x="540" y="290" width="200" height="130" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="320" fill="#7c3aed" font-size="30" font-weight="bold" text-anchor="middle">2.1s</text>
  <text x="640" y="348" fill="#111827" font-size="13" text-anchor="middle">Avg. Analysis Time</text>
  <text x="640" y="375" fill="#6b7280" font-size="10" text-anchor="middle">Per 1000-word document</text>
</svg>
