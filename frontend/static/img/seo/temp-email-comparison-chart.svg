<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#ecfeff" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">临时邮箱 vs 真实邮箱 — 为什么使用临时邮箱</text>

  <!-- Real email column -->
  <rect x="60" y="70" width="310" height="350" rx="14" fill="white" filter="url(#sh)"/>
  <rect x="60" y="70" width="310" height="50" rx="14" fill="#fef2f2"/>
  <rect x="60" y="105" width="310" height="15" fill="#fef2f2"/>
  <circle cx="100" cy="95" r="16" fill="#fca5a5" opacity="0.3"/>
  <text x="100" y="101" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">📧</text>
  <text x="130" y="102" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#991b1b">使用真实邮箱注册</text>

  <!-- Real email items -->
  <g transform="translate(80, 140)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">邮箱被永久关联账号</text>
  </g>
  <g transform="translate(80, 170)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">收到大量垃圾推广邮件</text>
  </g>
  <g transform="translate(80, 200)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">数据泄露后收到钓鱼邮件</text>
  </g>
  <g transform="translate(80, 230)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">无法阻止营销追踪</text>
  </g>
  <g transform="translate(80, 260)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">账号难以彻底删除</text>
  </g>
  <g transform="translate(80, 290)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">隐私长期暴露风险</text>
  </g>

  <!-- Real risk bar -->
  <text x="215" y="340" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">隐私风险</text>
  <rect x="90" y="350" width="240" height="16" rx="8" fill="#fee2e2"/>
  <rect x="90" y="350" width="216" height="16" rx="8" fill="url(#g2)"/>
  <text x="215" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="middle">90%</text>

  <!-- Temp email column -->
  <rect x="430" y="70" width="310" height="350" rx="14" fill="white" filter="url(#sh)" stroke="#a5f3fc" stroke-width="2"/>
  <rect x="430" y="70" width="310" height="50" rx="14" fill="#ecfeff"/>
  <rect x="430" y="105" width="310" height="15" fill="#ecfeff"/>
  <circle cx="470" cy="95" r="16" fill="#67e8f9" opacity="0.3"/>
  <text x="470" y="101" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">⭐</text>
  <text x="500" y="102" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#155e75">使用临时邮箱注册</text>

  <!-- Temp email items -->
  <g transform="translate(450, 140)">
    <circle cx="8" cy="0" r="4" fill="#22d3ee"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">邮箱到期自动销毁</text>
  </g>
  <g transform="translate(450, 170)">
    <circle cx="8" cy="0" r="4" fill="#22d3ee"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">零垃圾邮件困扰</text>
  </g>
  <g transform="translate(450, 200)">
    <circle cx="8" cy="0" r="4" fill="#22d3ee"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">数据泄露与你无关</text>
  </g>
  <g transform="translate(450, 230)">
    <circle cx="8" cy="0" r="4" fill="#22d3ee"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">无营销追踪可能</text>
  </g>
  <g transform="translate(450, 260)">
    <circle cx="8" cy="0" r="4" fill="#22d3ee"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">用完即走无需清理</text>
  </g>
  <g transform="translate(450, 290)">
    <circle cx="8" cy="0" r="4" fill="#22d3ee"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">100% 隐私保护</text>
  </g>

  <!-- Temp risk bar -->
  <text x="585" y="340" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">隐私风险</text>
  <rect x="460" y="350" width="240" height="16" rx="8" fill="#cffafe"/>
  <rect x="460" y="350" width="12" height="16" rx="8" fill="url(#g1)"/>
  <text x="585" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0e7490" text-anchor="middle">~0%</text>
</svg>