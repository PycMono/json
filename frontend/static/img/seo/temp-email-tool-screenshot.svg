<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfeff"/>
      <stop offset="100%" style="stop-color:#cffafe"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
    <filter id="shSm">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#06b6d4" opacity="0.04"/>
  <circle cx="1100" cy="530" r="180" fill="#0e7490" opacity="0.05"/>
  <circle cx="600" cy="600" r="300" fill="#06b6d4" opacity="0.03"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1200" height="80" fill="white" opacity="0.7"/>
  <rect x="40" y="15" width="320" height="50" rx="25" fill="url(#heroGrad)" opacity="0.1"/>
  <text x="60" y="48" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0e7490">📧 ToolboxNova Temp Email</text>

  <!-- Badge -->
  <rect x="920" y="20" width="240" height="40" rx="20" fill="#ecfeff"/>
  <text x="1040" y="46" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0e7490" text-anchor="middle">🔒 100% Free · No Registration</text>

  <!-- Main email card -->
  <rect x="100" y="120" width="1000" height="140" rx="16" fill="white" filter="url(#sh)"/>
  <text x="140" y="165" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Your Temporary Email Address</text>
  <rect x="140" y="180" width="680" height="50" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>
  <text x="170" y="212" font-family="ui-monospace, monospace" font-size="18" fill="#0e7490" font-weight="600">randomname@tempmail.dev</text>
  <rect x="850" y="180" width="220" height="50" rx="12" fill="url(#heroGrad)"/>
  <text x="960" y="212" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">📋 Copy Address</text>

  <!-- Timer section -->
  <rect x="100" y="280" width="1000" height="60" rx="12" fill="white" filter="url(#shSm)"/>
  <text x="140" y="318" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">⏱ Expires in</text>
  <rect x="280" y="295" width="50" height="36" rx="8" fill="#ecfeff"/>
  <text x="305" y="320" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#0e7490" text-anchor="middle">0</text>
  <rect x="340" y="295" width="50" height="36" rx="8" fill="#ecfeff"/>
  <text x="365" y="320" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#0e7490" text-anchor="middle">9</text>
  <text x="405" y="318" font-family="ui-monospace, monospace" font-size="20" fill="#06b6d4">:</text>
  <rect x="420" y="295" width="50" height="36" rx="8" fill="#ecfeff"/>
  <text x="445" y="320" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#0e7490" text-anchor="middle">5</text>
  <rect x="480" y="295" width="50" height="36" rx="8" fill="#ecfeff"/>
  <text x="505" y="320" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#0e7490" text-anchor="middle">9</text>
  <rect x="600" y="295" width="160" height="36" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>
  <text x="680" y="319" font-family="system-ui, sans-serif" font-size="13" fill="#0e7490" text-anchor="middle">⏰ Extend Timer</text>

  <!-- Inbox area -->
  <rect x="100" y="360" width="1000" height="220" rx="16" fill="white" filter="url(#sh)"/>
  <text x="140" y="400" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">📬 Inbox (2)</text>
  <text x="900" y="400" font-family="system-ui, sans-serif" font-size="12" fill="#06b6d4">● Auto-checking every 15s</text>

  <!-- Email 1 -->
  <rect x="130" y="420" width="940" height="60" rx="10" fill="#f0fdfa"/>
  <circle cx="170" cy="450" r="18" fill="#0e7490" opacity="0.1"/>
  <text x="170" y="456" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">G</text>
  <text x="200" y="443" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Google — Verify your email address</text>
  <text x="200" y="465" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Your verification code is 582914. Enter this code to verify...</text>
  <text x="1000" y="453" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">2 min ago</text>

  <!-- Email 2 -->
  <rect x="130" y="490" width="940" height="60" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="170" cy="520" r="18" fill="#06b6d4" opacity="0.1"/>
  <text x="170" y="526" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">T</text>
  <text x="200" y="513" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">Twitter — Confirm your account</text>
  <text x="200" y="535" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Click the link below to confirm your new Twitter account...</text>
  <text x="1000" y="523" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">5 min ago</text>

  <!-- Stats bar -->
  <rect x="100" y="590" width="1000" height="30" rx="0" fill="transparent"/>
  <text x="200" y="612" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">📧 1,240+ emails today</text>
  <text x="500" y="612" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">🛡️ 8,500+ spam blocked</text>
  <text x="800" y="612" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">🌍 Used in 180+ countries</text>
</svg>