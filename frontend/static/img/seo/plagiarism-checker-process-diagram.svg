<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#ecfdf5"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="300" rx="16" fill="url(#bg)"/>
  <!-- Title -->
  <text x="400" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#0f172a" text-anchor="middle">How Plagiarism Detection Works</text>
  <text x="400" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Four simple steps to ensure your content originality</text>
  <!-- Step 1 -->
  <circle cx="130" cy="160" r="40" fill="#10b981"/>
  <text x="130" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="130" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Paste Text</text>
  <text x="130" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Upload or paste</text>
  <text x="130" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">your document</text>
  <!-- Connector 1 -->
  <rect x="180" y="155" width="100" height="10" rx="5" fill="#e2e8f0"/>
  <circle cx="230" cy="160" r="5" fill="#10b981"/>
  <!-- Step 2 -->
  <circle cx="330" cy="160" r="40" fill="#10b981"/>
  <text x="330" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="330" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Deep Scan</text>
  <text x="330" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">AI compares</text>
  <text x="330" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">billions of sources</text>
  <!-- Connector 2 -->
  <rect x="380" y="155" width="100" height="10" rx="5" fill="#e2e8f0"/>
  <circle cx="430" cy="160" r="5" fill="#10b981"/>
  <!-- Step 3 -->
  <circle cx="530" cy="160" r="40" fill="#10b981"/>
  <text x="530" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="530" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Analyze</text>
  <text x="530" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Detect matches</text>
  <text x="530" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">& AI content</text>
  <!-- Connector 3 -->
  <rect x="580" y="155" width="80" height="10" rx="5" fill="#e2e8f0"/>
  <circle cx="620" cy="160" r="5" fill="#10b981"/>
  <!-- Step 4 -->
  <circle cx="700" cy="160" r="40" fill="#059669"/>
  <text x="700" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="700" y="220" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">Get Results</text>
  <text x="700" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Detailed report</text>
  <text x="700" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">with sources</text>
</svg>