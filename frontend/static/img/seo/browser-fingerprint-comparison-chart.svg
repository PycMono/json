<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#fffbeb" rx="12"/>
  <text x="400" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">不同浏览器的指纹防护能力对比</text>

  <!-- Column headers -->
  <rect x="40" y="65" width="120" height="40" rx="8" fill="#f8fafc"/>
  <text x="100" y="90" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">浏览器</text>
  <rect x="170" y="65" width="110" height="40" rx="8" fill="#f8fafc"/>
  <text x="225" y="90" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">指纹唯一性</text>
  <rect x="290" y="65" width="110" height="40" rx="8" fill="#f8fafc"/>
  <text x="345" y="90" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">WebRTC防护</text>
  <rect x="410" y="65" width="110" height="40" rx="8" fill="#f8fafc"/>
  <text x="465" y="90" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">Canvas防护</text>
  <rect x="530" y="65" width="110" height="40" rx="8" fill="#f8fafc"/>
  <text x="585" y="90" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">综合评分</text>

  <!-- Row 1: Tor Browser -->
  <rect x="40" y="115" width="720" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="100" y="148" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">🧅 Tor Browser</text>
  <rect x="195" y="130" width="60" height="24" rx="12" fill="#dcfce7"/>
  <text x="225" y="147" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">低</text>
  <rect x="315" y="130" width="60" height="24" rx="12" fill="#dcfce7"/>
  <text x="345" y="147" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">禁用</text>
  <rect x="435" y="130" width="60" height="24" rx="12" fill="#dcfce7"/>
  <text x="465" y="147" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">随机化</text>
  <rect x="560" y="125" width="50" height="32" rx="16" fill="#16a34a"/>
  <text x="585" y="147" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">98</text>

  <!-- Row 2: Brave -->
  <rect x="40" y="180" width="720" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="100" y="213" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">🦁 Brave</text>
  <rect x="195" y="195" width="60" height="24" rx="12" fill="#fef9c3"/>
  <text x="225" y="212" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a16207" text-anchor="middle">中低</text>
  <rect x="315" y="195" width="60" height="24" rx="12" fill="#dcfce7"/>
  <text x="345" y="212" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">可配置</text>
  <rect x="435" y="195" width="60" height="24" rx="12" fill="#dcfce7"/>
  <text x="465" y="212" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">随机化</text>
