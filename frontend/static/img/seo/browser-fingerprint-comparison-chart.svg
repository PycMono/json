  <text x="585" y="212" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">85</text>

  <!-- Row 3: Firefox -->
  <rect x="40" y="245" width="720" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="100" y="278" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">🦊 Firefox</text>
  <rect x="195" y="260" width="60" height="24" rx="12" fill="#fef9c3"/>
