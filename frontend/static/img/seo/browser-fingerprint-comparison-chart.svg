  <rect x="315" y="260" width="60" height="24" rx="12" fill="#fef9c3"/>
  <text x="345" y="277" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a16207" text-anchor="middle">需配置</text>
  <rect x="435" y="260" width="60" height="24" rx="12" fill="#fef9c3"/>
  <text x="465" y="277" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a16207" text-anchor="middle">部分</text>
  <rect x="560" y="255" width="50" height="32" rx="16" fill="#f59e0b"/>
  <text x="585" y="277" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">70</text>

  <!-- Row 4: Chrome -->
  <rect x="40" y="310" width="720" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="100" y="343" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">🌐 Chrome</text>
  <rect x="195" y="325" width="60" height="24" rx="12" fill="#fef2f2"/>
  <text x="225" y="342" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626" text-anchor="middle">高</text>
  <rect x="315" y="325" width="60" height="24" rx="12" fill="#fef2f2"/>
  <text x="345" y="342" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626" text-anchor="middle">无</text>
  <rect x="435" y="325" width="60" height="24" rx="12" fill="#fef2f2"/>
  <text x="465" y="342" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626" text-anchor="middle">无</text>
  <rect x="560" y="320" width="50" height="32" rx="16" fill="#ef4444"/>
  <text x="585" y="342" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">35</text>

  <!-- Row 5: Edge -->
  <rect x="40" y="375" width="720" height="55" rx="10" fill="white" filter="url(#sh)"/>
  <text x="100" y="408" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">🔷 Edge</text>
  <rect x="195" y="390" width="60" height="24" rx="12" fill="#fef2f2"/>
  <text x="225" y="407" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626" text-anchor="middle">高</text>
  <rect x="315" y="390" width="60" height="24" rx="12" fill="#fef2f2"/>
  <text x="345" y="407" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626" text-anchor="middle">无</text>
  <rect x="435" y="390" width="60" height="24" rx="12" fill="#fef2f2"/>
  <text x="465" y="407" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626" text-anchor="middle">无</text>
  <rect x="560" y="385" width="50" height="32" rx="16" fill="#ef4444"/>
  <text x="585" y="407" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">30</text>
</svg>