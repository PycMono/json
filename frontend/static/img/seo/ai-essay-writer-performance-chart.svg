<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f9fafb"/>
  <text x="400" y="40" fill="#111827" font-size="22" font-weight="bold" text-anchor="middle">AI Essay Writer Performance Comparison</text>

  <!-- Chart area -->
  <rect x="50" y="70" width="700" height="350" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="40" y="100" fill="#6b7280" font-size="11" text-anchor="end">100%</text>
  <text x="40" y="190" fill="#6b7280" font-size="11" text-anchor="end">75%</text>
  <text x="40" y="280" fill="#6b7280" font-size="11" text-anchor="end">50%</text>
  <text x="40" y="370" fill="#6b7280" font-size="11" text-anchor="end">25%</text>
  <text x="40" y="415" fill="#6b7280" font-size="11" text-anchor="end">0%</text>

  <!-- Grid lines -->
  <line x1="50" y1="95" x2="750" y2="95" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="185" x2="750" y2="185" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="275" x2="750" y2="275" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="365" x2="750" y2="365" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Our Tool -->
  <g transform="translate(80, 0)">
    <rect x="0" y="110" width="80" height="305" rx="4" fill="#6366f1"/>
    <text x="40" y="100" fill="#6366f1" font-size="14" font-weight="bold" text-anchor="middle">95%</text>
    <text x="40" y="435" fill="#111827" font-size="12" font-weight="bold" text-anchor="middle">AI Essay</text>
    <text x="40" y="450" fill="#111827" font-size="12" font-weight="bold" text-anchor="middle">Writer</text>
  </g>

  <!-- Competitor 1 -->
  <g transform="translate(200, 0)">
    <rect x="0" y="200" width="80" height="215" rx="4" fill="#8b5cf6"/>
    <text x="40" y="190" fill="#8b5cf6" font-size="14" font-weight="bold" text-anchor="middle">72%</text>
    <text x="40" y="435" fill="#6b7280" font-size="11" text-anchor="middle">Competitor A</text>
  </g>

  <!-- Competitor 2 -->
  <g transform="translate(320, 0)">
    <rect x="0" y="230" width="80" height="185" rx="4" fill="#10b981"/>
    <text x="40" y="220" fill="#10b981" font-size="14" font-weight="bold" text-anchor="middle">64%</text>
    <text x="40" y="435" fill="#6b7280" font-size="11" text-anchor="middle">Competitor B</text>
  </g>

  <!-- Competitor 3 -->
  <g transform="translate(440, 0)">
    <rect x="0" y="260" width="80" height="155" rx="4" fill="#f59e0b"/>
    <text x="40" y="250" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">55%</text>
    <text x="40" y="435" fill="#6b7280" font-size="11" text-anchor="middle">Competitor C</text>
  </g>

  <!-- Competitor 4 -->
  <g transform="translate(560, 0)">
    <rect x="0" y="290" width="80" height="125" rx="4" fill="#ef4444"/>
    <text x="40" y="280" fill="#ef4444" font-size="14" font-weight="bold" text-anchor="middle">45%</text>
    <text x="40" y="435" fill="#6b7280" font-size="11" text-anchor="middle">Competitor D</text>
  </g>

  <!-- Stats row -->
  <rect x="50" y="470" width="700" height="20" rx="4" fill="#ecfdf5"/>
  <text x="400" y="484" fill="#059669" font-size="12" text-anchor="middle">
    ✓ 32% Higher Accuracy | ✓ 2x Faster Generation | ✓ Better Citation Formatting
  </text>
</svg>