<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="barGradHigh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="barGradMedium" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="barGradLow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#fffbeb" rx="12"/>
  <text x="400" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">浏览器指纹检测向量与风险等级</text>

  <!-- Y axis -->
  <line x1="80" y1="80" x1="80" y2="420" stroke="#d97706" stroke-width="2"/>
  <text x="40" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#78350f">高风险</text>
  <text x="40" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#78350f">中风险</text>
  <text x="40" y="350" font-family="system-ui, sans-serif" font-size="11" fill="#78350f">低风险</text>

  <!-- High risk bars -->
  <rect x="100" y="90" width="60" height="100" rx="6" fill="url(#barGradHigh)" filter="url(#sh)"/>
  <text x="130" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a" text-anchor="middle">WebRTC</text>
  <text x="130" y="265" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">IP泄漏</text>

  <rect x="180" y="100" width="60" height="90" rx="6" fill="url(#barGradHigh)" filter="url(#sh)"/>
  <text x="210" y="250" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a" text-anchor="middle">Canvas</text>
  <text x="210" y="265" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">渲染指纹</text>

  <!-- Medium risk bars -->
  <rect x="260" y="180" width="60" height="70" rx="6" fill="url(#barGradMedium)" filter="url(#sh)"/>
  <text x="290" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a" text-anchor="middle">WebGL</text>
  <text x="290" y="315" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">GPU信息</text>

  <rect x="340" y="190" width="60" height="60" rx="6" fill="url(#barGradMedium)" filter="url(#sh)"/>
  <text x="370" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a" text-anchor="middle">字体</text>
  <text x="370" y="315" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">字体枚举</text>

  <rect x="420" y="200" width="60" height="50" rx="6" fill="url(#barGradMedium)" filter="url(#sh)"/>
  <text x="450" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a" text-anchor="middle">音频</text>
  <text x="450" y="315" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">音频指纹</text>

  <!-- Low risk bars -->
  <rect x="500" y="320" width="60" height="40" rx="6" fill="url(#barGradLow)" filter="url(#sh)"/>
  <text x="530" y="400" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a" text-anchor="middle">屏幕</text>
  <text x="530" y="415" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">分辨率</text>

  <rect x="580" y="330" width="60" height="30" rx="6" fill="url(#barGradLow)" filter="url(#sh)"/>
  <text x="610" y="400" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a" text-anchor="middle">语言</text>
  <text x="610" y="415" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">浏览器语言</text>

  <rect x="660" y="340" width="60" height="25" rx="6" fill="url(#barGradLow)" filter="url(#sh)"/>
  <text x="690" y="400" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a" text-anchor="middle">硬件</text>
  <text x="690" y="415" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">CPU核心</text>

  <!-- Legend -->
  <rect x="100" y="450" width="700" height="40" rx="10" fill="white" filter="url(#sh)"/>
  <rect x="130" y="460" width="16" height="16" rx="4" fill="#ef4444"/>
  <text x="155" y="472" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">高风险：可直接追踪定位</text>
  <rect x="330" y="460" width="16" height="16" rx="4" fill="#f59e0b"/>
  <text x="355" y="472" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">中风险：组合可追踪</text>
  <rect x="530" y="460" width="16" height="16" rx="4" fill="#22c55e"/>
  <text x="555" y="472" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">低风险：影响较小</text>

  <!-- Stats -->
  <text x="130" y="120" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">85%</text>
  <text x="210" y="130" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">72%</text>
  <text x="290" y="210" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">65%</text>
  <text x="370" y="220" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">58%</text>
  <text x="450" y="225" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">45%</text>
</svg>