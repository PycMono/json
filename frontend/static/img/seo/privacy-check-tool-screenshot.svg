<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#be123c"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff1f2"/>
      <stop offset="100%" style="stop-color:#ffe4e6"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="200" fill="#f43f5e" opacity="0.04"/>
  <circle cx="1100" cy="530" r="180" fill="#be123c" opacity="0.05"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="white" opacity="0.7"/>
  <rect x="40" y="15" width="360" height="50" rx="25" fill="url(#heroGrad)" opacity="0.1"/>
  <text x="60" y="48" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#be123c">🛡️ ToolboxNova Privacy Check</text>
  <rect x="880" y="20" width="280" height="40" rx="20" fill="#fff1f2"/>
  <text x="1020" y="46" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#be123c" text-anchor="middle">🔒 Powered by Have I Been Pwned</text>

  <!-- Main card -->
  <rect x="100" y="110" width="1000" height="200" rx="16" fill="white" filter="url(#sh)"/>
  <text x="140" y="155" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#0f172a">📧 Check Your Email for Data Breaches</text>
  <rect x="140" y="175" width="700" height="50" rx="12" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="170" y="207" font-family="ui-monospace, monospace" font-size="16" fill="#64748b">Enter your email address...</text>
  <rect x="870" y="175" width="200" height="50" rx="12" fill="url(#heroGrad)"/>
  <text x="970" y="207" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">🔍 Check Now</text>

  <!-- Tab bar -->
  <rect x="140" y="245" width="85" height="35" rx="8" fill="#be123c"/>
  <text x="182" y="268" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Email</text>
  <rect x="235" y="245" width="100" height="35" rx="8" fill="#fff1f2"/>
  <text x="285" y="268" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Password</text>
  <rect x="345" y="245" width="95" height="35" rx="8" fill="#fff1f2"/>
  <text x="392" y="268" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Breaches</text>
  <rect x="450" y="245" width="105" height="35" rx="8" fill="#fff1f2"/>
  <text x="502" y="268" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Generator</text>

  <!-- Result cards -->
  <rect x="100" y="330" width="320" height="120" rx="12" fill="white" filter="url(#sh)"/>
  <circle cx="140" cy="370" r="25" fill="#dcfce7"/>
  <text x="140" y="377" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">✅</text>
  <text x="180" y="365" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Email Safe</text>
  <text x="180" y="385" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">No breaches found</text>
  <text x="180" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Health Score: </text>
  <text x="275" y="410" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#16a34a">95/100</text>

  <rect x="440" y="330" width="320" height="120" rx="12" fill="white" filter="url(#sh)"/>
  <circle cx="480" cy="370" r="25" fill="#fef2f2"/>
  <text x="480" y="377" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">⚠️</text>
  <text x="520" y="365" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#be123c">3 Breaches Found</text>
  <text x="520" y="385" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">LinkedIn · Adobe · Yahoo</text>
  <text x="520" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Health Score: </text>
  <text x="615" y="410" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#be123c">35/100</text>

  <rect x="780" y="330" width="320" height="120" rx="12" fill="white" filter="url(#sh)"/>
  <text x="810" y="365" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a">🔒 Password Strength</text>
  <rect x="810" y="380" width="260" height="12" rx="6" fill="#f1f5f9"/>
  <rect x="810" y="380" width="220" height="12" rx="6" fill="url(#heroGrad)"/>
  <text x="810" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Crack time: 3 centuries</text>
  <text x="1010" y="410" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#be123c" text-anchor="end">Strong</text>

  <!-- Bottom stats -->
  <rect x="100" y="480" width="1000" height="110" rx="16" fill="white" filter="url(#sh)"/>
  <g transform="translate(140, 510)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#be123c">12B+</text>
    <text x="0" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Leaked Accounts</text>
  </g>
  <line x1="290" y1="500" x2="290" y2="560" stroke="#fecdd3" stroke-width="1"/>
  <g transform="translate(330, 510)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#f43f5e">600+</text>
    <text x="0" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Known Breaches</text>
  </g>
  <line x1="490" y1="500" x2="490" y2="560" stroke="#fecdd3" stroke-width="1"/>
  <g transform="translate(530, 510)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#be123c">100%</text>
    <text x="0" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Free to Use</text>
  </g>
  <line x1="680" y1="500" x2="680" y2="560" stroke="#fecdd3" stroke-width="1"/>
  <g transform="translate(720, 510)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#f43f5e">K-Anonymity</text>
    <text x="0" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Password Safety</text>
  </g>
</svg>