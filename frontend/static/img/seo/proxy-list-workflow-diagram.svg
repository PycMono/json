<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="18" font-weight="700">How Free Proxy List Works</text>

  <!-- Step 1 -->
  <rect x="60" y="80" width="200" height="160" rx="12" fill="white" stroke="#d1fae5" stroke-width="2"/>
  <circle cx="160" cy="110" r="20" fill="#059669"/>
  <text x="160" y="116" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="16" font-weight="700">1</text>
  <text x="160" y="150" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Browse &amp; Filter</text>
  <text x="160" y="172" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">Select protocol, country,</text>
  <text x="160" y="188" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">anonymity level, or</text>
  <text x="160" y="204" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">search by IP / keyword</text>
  <!-- Icon -->
  <text x="160" y="228" text-anchor="middle" font-size="20">🔍</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="160" x2="300" y2="160" stroke="#10b981" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="300,154 312,160 300,166" fill="#10b981"/>

  <!-- Step 2 -->
  <rect x="300" y="80" width="200" height="160" rx="12" fill="white" stroke="#d1fae5" stroke-width="2"/>
  <circle cx="400" cy="110" r="20" fill="#059669"/>
  <text x="400" y="116" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="16" font-weight="700">2</text>
  <text x="400" y="150" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Check Quality</text>
  <text x="400" y="172" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">View latency, uptime %,</text>
  <text x="400" y="188" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">and last-checked time</text>
  <text x="400" y="204" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">for each proxy</text>
  <text x="400" y="228" text-anchor="middle" font-size="20">📊</text>

  <!-- Arrow 2 -->
  <line x1="510" y1="160" x2="540" y2="160" stroke="#10b981" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="540,154 552,160 540,166" fill="#10b981"/>

  <!-- Step 3 -->
  <rect x="540" y="80" width="200" height="160" rx="12" fill="white" stroke="#d1fae5" stroke-width="2"/>
  <circle cx="640" cy="110" r="20" fill="#059669"/>
  <text x="640" y="116" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="16" font-weight="700">3</text>
  <text x="640" y="150" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Copy &amp; Use</text>
  <text x="640" y="172" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">One-click copy IP:Port</text>
  <text x="640" y="188" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">or export all proxies</text>
  <text x="640" y="204" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">as CSV / TXT file</text>
  <text x="640" y="228" text-anchor="middle" font-size="20">📋</text>

  <!-- Data source section -->
  <rect x="60" y="280" width="680" height="180" rx="12" fill="white" stroke="#d1fae5" stroke-width="1"/>
  <text x="400" y="310" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Automated Data Pipeline</text>

  <!-- Source nodes -->
  <rect x="100" y="330" width="140" height="50" rx="8" fill="#ecfdf5" stroke="#d1fae5"/>
  <text x="170" y="350" text-anchor="middle" fill="#059669" font-family="system-ui,sans-serif" font-size="12" font-weight="600">🌐 ProxyScrape API</text>
  <text x="170" y="368" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="10">HTTP/HTTPS/SOCKS</text>

  <rect x="330" y="330" width="140" height="50" rx="8" fill="#ecfdf5" stroke="#d1fae5"/>
  <text x="400" y="350" text-anchor="middle" fill="#059669" font-family="system-ui,sans-serif" font-size="12" font-weight="600">⏱ Every 30 Min</text>
  <text x="400" y="368" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="10">Auto Sync</text>

  <rect x="560" y="330" width="140" height="50" rx="8" fill="#ecfdf5" stroke="#d1fae5"/>
  <text x="630" y="350" text-anchor="middle" fill="#059669" font-family="system-ui,sans-serif" font-size="12" font-weight="600">✅ Verified &amp; Alive</text>
  <text x="630" y="368" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="10">Latency Tested</text>

  <!-- Arrows between source nodes -->
  <line x1="245" y1="355" x2="325" y2="355" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="325,350 335,355 325,360" fill="#10b981"/>
  <line x1="475" y1="355" x2="555" y2="355" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="555,350 565,355 555,360" fill="#10b981"/>

  <!-- Bottom stats -->
  <text x="400" y="430" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="12">Result: 10,000+ verified proxies across 84 countries · 92% alive rate</text>
</svg>
