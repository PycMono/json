    <text x="50" y="150" text-anchor="middle" fill="#6b7280" font-size="10">Smooth &amp; readable</text>
  </g>
  <g transform="translate(240, 80)">
    <circle cx="50" cy="50" r="45" fill="#1e3a5f"/>
