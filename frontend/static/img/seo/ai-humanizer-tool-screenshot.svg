  <text x="540" y="490" font-family="system-ui" font-size="12" font-weight="600" fill="#475569">GPTZero</text>
  <text x="600" y="490" font-family="system-ui" font-size="12" fill="#cbd5e1">&#xB7;</text>
  <text x="615" y="490" font-family="system-ui" font-size="12" font-weight="600" fill="#475569">Turnitin</text>
  <text x="675" y="490" font-family="system-ui" font-size="12" fill="#cbd5e1">&#xB7;</text>
  <text x="690" y="490" font-family="system-ui" font-size="12" font-weight="600" fill="#475569">Copyleaks</text>
  <text x="765" y="490" font-family="system-ui" font-size="12" fill="#cbd5e1">&#xB7;</text>
  <text x="780" y="490" font-family="system-ui" font-size="12" font-weight="600" fill="#475569">Originality.ai</text>
