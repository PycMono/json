  <text x="100" y="270" font-family="system-ui" font-size="14" fill="#94a3b8">Insert (English) text here...</text>
  <text x="100" y="300" font-family="system-ui" font-size="13" fill="#334155">The rapid advancement of artificial intelligence has fundamentally transformed how we</text>
  <text x="100" y="322" font-family="system-ui" font-size="13" fill="#334155">approach content creation. AI models like ChatGPT, Claude, and Gemini can generate</text>
  <text x="100" y="344" font-family="system-ui" font-size="13" fill="#334155">text at unprecedented speed. However, this content often carries detectable patterns...</text>
