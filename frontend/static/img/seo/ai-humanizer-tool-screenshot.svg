  <text x="200" y="555" font-family="system-ui" font-size="22" font-weight="700" fill="#00a8cc" text-anchor="middle">15,000</text>
  <text x="200" y="580" font-family="system-ui" font-size="11" fill="#94a3b8" text-anchor="middle">Words Per Request</text>
  <text x="460" y="555" font-family="system-ui" font-size="22" font-weight="700" fill="#00a8cc" text-anchor="middle">10+</text>
  <text x="460" y="580" font-family="system-ui" font-size="11" fill="#94a3b8" text-anchor="middle">Humanize Modes</text>
  <text x="720" y="555" font-family="system-ui" font-size="22" font-weight="700" fill="#00a8cc" text-anchor="middle">50+</text>
  <text x="720" y="580" font-family="system-ui" font-size="11" fill="#94a3b8" text-anchor="middle">Languages Supported</text>
  <text x="980" y="555" font-family="system-ui" font-size="22" font-weight="700" fill="#00a8cc" text-anchor="middle">$0</text>
