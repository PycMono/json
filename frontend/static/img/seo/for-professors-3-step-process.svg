<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f9fafb" rx="16"/>
  <text x="400" y="40" fill="#111827" font-size="22" font-weight="bold" text-anchor="middle">How to Humanize Academic Text — 3 Simple Steps</text>
  <!-- Step 1 -->
  <rect x="40" y="70" width="220" height="260" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="150" cy="115" r="35" fill="#8b5cf6"/>
  <text x="150" y="125" fill="#fff" font-size="28" font-weight="bold" text-anchor="middle">1</text>
  <text x="150" y="175" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Paste Your Text</text>
  <text x="150" y="200" fill="#6b7280" font-size="12" text-anchor="middle">Copy and paste your AI-generated</text>
  <text x="150" y="218" fill="#6b7280" font-size="12" text-anchor="middle">academic content into the</text>
  <text x="150" y="236" fill="#6b7280" font-size="12" text-anchor="middle">input field.</text>
  <text x="150" y="270" fill="#8b5cf6" font-size="11" text-anchor="middle">Supports: Lecture Notes,</text>
  <text x="150" y="288" fill="#8b5cf6" font-size="11" text-anchor="middle">Emails, Syllabi, Research</text>
  <!-- Step 2 -->
  <rect x="290" y="70" width="220" height="260" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="400" cy="115" r="35" fill="#8b5cf6"/>
  <text x="400" y="125" fill="#fff" font-size="28" font-weight="bold" text-anchor="middle">2</text>
  <text x="400" y="175" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Choose Settings</text>
  <text x="400" y="200" fill="#6b7280" font-size="12" text-anchor="middle">Select document type and</text>
  <text x="400" y="218" fill="#6b7280" font-size="12" text-anchor="middle">desired tone (Warm,</text>
  <text x="400" y="236" fill="#6b7280" font-size="12" text-anchor="middle">Authoritative, Approachable).</text>
  <text x="400" y="270" fill="#8b5cf6" font-size="11" text-anchor="middle">Doc Types: Lecture Notes,</text>
  <text x="400" y="288" fill="#8b5cf6" font-size="11" text-anchor="middle">Email, Syllabus, Research,</text>
  <text x="400" y="306" fill="#8b5cf6" font-size="11" text-anchor="middle">Feedback</text>
  <!-- Step 3 -->
  <rect x="540" y="70" width="220" height="260" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <circle cx="650" cy="115" r="35" fill="#10b981"/>
  <text x="650" y="125" fill="#fff" font-size="28" font-weight="bold" text-anchor="middle">3</text>
  <text x="650" y="175" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Get Humanized Output</text>
  <text x="650" y="200" fill="#6b7280" font-size="12" text-anchor="middle">Click Humanize and receive</text>
  <text x="650" y="218" fill="#6b7280" font-size="12" text-anchor="middle">your naturally-sounding</text>
  <text x="650" y="236" fill="#6b7280" font-size="12" text-anchor="middle">academic content instantly.</text>
  <text x="650" y="270" fill="#10b981" font-size="11" text-anchor="middle">✓ Passes AI Detectors</text>
  <text x="650" y="288" fill="#10b981" font-size="11" text-anchor="middle">✓ 100% Original Content</text>
  <text x="650" y="306" fill="#10b981" font-size="11" text-anchor="middle">✓ Academic Quality</text>
  <!-- Arrow 1 -->
  <path d="M260 180 L290 180" stroke="#d1d5db" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d1d5db"/></marker></defs>
  <!-- Arrow 2 -->
  <path d="M510 180 L540 180" stroke="#d1d5db" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
</svg>
