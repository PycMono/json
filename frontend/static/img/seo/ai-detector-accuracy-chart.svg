<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bar-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#bg-gradient)"/>
  <!-- Title -->
  <text x="400" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#0f172a" text-anchor="middle">AI Detection Accuracy Rates</text>
  <text x="400" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Verified accuracy across major AI content detection platforms</text>
  <!-- Y-axis labels -->
  <text x="50" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">100%</text>
  <text x="50" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">95%</text>
  <text x="50" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">90%</text>
  <text x="50" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">85%</text>
  <text x="50" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">80%</text>
  <text x="50" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="end">75%</text>
  <!-- Grid lines -->
  <line x1="60" y1="105" x2="750" y2="105" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="155" x2="750" y2="155" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="205" x2="750" y2="205" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="255" x2="750" y2="255" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="305" x2="750" y2="305" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="60" y1="355" x2="750" y2="355" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Bars -->
  <!-- Overall -->
  <rect x="70" y="108" width="80" height="245" rx="4" fill="url(#bar-gradient)"/>
  <text x="110" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">99.2%</text>
  <text x="110" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Overall</text>
  <!-- GPT-4 -->
  <rect x="165" y="115" width="80" height="238" rx="4" fill="url(#bar-gradient)" opacity="0.95"/>
  <text x="205" y="107" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">98.5%</text>
  <text x="205" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">GPT-4</text>
  <!-- Claude -->
  <rect x="260" y="122" width="80" height="231" rx="4" fill="url(#bar-gradient)" opacity="0.9"/>
  <text x="300" y="114" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">97.8%</text>
  <text x="300" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Claude</text>
  <!-- Gemini -->
  <rect x="355" y="120" width="80" height="233" rx="4" fill="url(#bar-gradient)" opacity="0.92"/>
  <text x="395" y="112" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">98.1%</text>
  <text x="395" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Gemini</text>
  <!-- DeepSeek -->
  <rect x="450" y="130" width="80" height="223" rx="4" fill="url(#bar-gradient)" opacity="0.88"/>
  <text x="490" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">97.2%</text>
  <text x="490" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">DeepSeek</text>
  <!-- Llama -->
  <rect x="545" y="140" width="80" height="213" rx="4" fill="url(#bar-gradient)" opacity="0.85"/>
  <text x="585" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">96.5%</text>
  <text x="585" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Llama</text>
  <!-- Others -->
  <rect x="640" y="150" width="80" height="203" rx="4" fill="url(#bar-gradient)" opacity="0.82"/>
  <text x="680" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">95%+</text>
  <text x="680" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Others</text>
  <!-- Average line -->
  <line x1="60" y1="115" x2="750" y2="115" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="760" y="119" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#4f46e5">Avg: 97%</text>
  <!-- Stats box -->
  <rect x="580" y="180" width="170" height="100" rx="12" fill="white" stroke="#e2e8f0"/>
  <text x="665" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Tests Conducted</text>
  <text x="665" y="245" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#10b981" text-anchor="middle">2M+</text>
  <text x="665" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">across all AI models</text>
</svg>