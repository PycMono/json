<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#ecfdf5"/>
    </linearGradient>
    <linearGradient id="bar-original" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="bar-ai" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  <!-- Title -->
  <text x="400" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#0f172a" text-anchor="middle">Plagiarism vs AI Detection Comparison</text>
  <text x="400" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Understanding the difference between original, plagiarized, and AI content</text>
  <!-- Comparison Cards -->
  <!-- Original Content -->
  <rect x="40" y="95" width="220" height="180" rx="12" fill="#fff" stroke="#10b981" stroke-width="2"/>
  <circle cx="150" cy="140" r="30" fill="#10b981" opacity="0.12"/>
  <text x="150" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="20" text-anchor="middle" fill="#10b981">✓</text>
  <text x="150" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">Original</text>
  <text x="150" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Unique thoughts</text>
  <text x="150" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Proper citations</text>
  <text x="150" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#10b981" text-anchor="middle">0% Plagiarism</text>
  <!-- Plagiarized Content -->
  <rect x="290" y="95" width="220" height="180" rx="12" fill="#fff" stroke="#ef4444" stroke-width="2"/>
  <circle cx="400" cy="140" r="30" fill="#ef4444" opacity="0.12"/>
  <text x="400" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="20" text-anchor="middle" fill="#ef4444">⚠</text>
  <text x="400" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">Plagiarized</text>
  <text x="400" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Copied from sources</text>
  <text x="400" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Missing attribution</text>
  <text x="400" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">High Risk</text>
  <!-- AI Content -->
  <rect x="540" y="95" width="220" height="180" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="650" cy="140" r="30" fill="#f59e0b" opacity="0.12"/>
  <text x="650" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="20" text-anchor="middle" fill="#f59e0b">AI</text>
  <text x="650" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">AI-Generated</text>
  <text x="650" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Machine-written text</text>
  <text x="650" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Predictable patterns</text>
  <text x="650" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">Needs Review</text>
  <!-- Detection Methods -->
  <rect x="40" y="295" width="720" height="85" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <text x="400" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0f172a" text-anchor="middle">Detection Methods Comparison</text>
  <!-- Original detection -->
  <rect x="60" y="340" width="200" height="8" rx="4" fill="url(#bar-original)"/>
  <text x="160" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Unique content fingerprinting</text>
  <!-- Plagiarized detection -->
  <rect x="60" y="375" width="200" height="8" rx="4" fill="#ef4444" opacity="0.9"/>
  <text x="160" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Source matching & citation check</text>
  <!-- AI detection -->
  <rect x="380" y="340" width="200" height="8" rx="4" fill="url(#bar-ai)"/>
  <text x="480" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Perplexity & burstiness analysis</text>
  <rect x="380" y="375" width="200" height="8" rx="4" fill="#6366f1" opacity="0.8"/>
  <text x="480" y="395" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Multi-detector consensus scoring</text>
  <text x="640" y="365" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0f172a">Our Tool</text>
  <text x="640" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#64748b">Detects ALL types</text>
  <circle cx="730" cy="365" r="12" fill="#10b981"/>
  <text x="730" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">✓</text>
</svg>