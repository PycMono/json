<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#0d9488" opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="#059669" opacity="0.05"/>

  <!-- Main card -->
  <rect x="60" y="40" width="1080" height="550" rx="16" fill="white" filter="url(#shadow)"/>

  <!-- Header bar -->
  <rect x="60" y="40" width="1080" height="60" rx="16" fill="url(#tealGrad)"/>
  <rect x="60" y="80" width="1080" height="20" fill="url(#tealGrad)"/>

  <!-- Logo -->
  <circle cx="95" cy="70" r="18" fill="white" opacity="0.2"/>
  <text x="125" y="78" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="white">SMS Receiver</text>

  <!-- Stats badges -->
  <g transform="translate(750, 55)">
    <rect x="0" y="0" width="80" height="30" rx="15" fill="white" opacity="0.2"/>
    <text x="40" y="21" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">180+ 国家</text>
  </g>
  <g transform="translate(840, 55)">
    <rect x="0" y="0" width="80" height="30" rx="15" fill="white" opacity="0.2"/>
    <text x="40" y="21" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">700+ 平台</text>
  </g>
  <g transform="translate(930, 55)">
    <rect x="0" y="0" width="80" height="30" rx="15" fill="white" opacity="0.2"/>
    <text x="40" y="21" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">秒级到达</text>
  </g>

  <!-- Search area -->
  <rect x="100" y="120" width="700" height="50" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="130" cy="145" r="12" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <line x1="139" y1="154" x2="148" y2="163" stroke="#94a3b8" stroke-width="2"/>
  <text x="160" y="151" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">搜索平台（Google, WhatsApp, Telegram...）</text>
  <rect x="820" y="120" width="120" height="50" rx="8" fill="url(#tealGrad)"/>
  <text x="880" y="151" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="white" text-anchor="middle">立即获取</text>

  <!-- Country selector -->
  <g transform="translate(100, 200)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">选择国家</text>
    <rect x="0" y="10" width="250" height="40" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="36" font-family="system-ui, sans-serif" font-size="14" fill="#0f172a">🇺🇸 United States</text>
    <path d="M220 25 L230 35 L240 25" fill="none" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <!-- Service selector -->
  <g transform="translate(370, 200)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">选择平台</text>
    <rect x="0" y="10" width="250" height="40" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="36" font-family="system-ui, sans-serif" font-size="14" fill="#0f172a">🔵 Google</text>
    <path d="M220 25 L230 35 L240 25" fill="none" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <!-- Operator selector -->
  <g transform="translate(640, 200)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">选择运营商</text>
    <rect x="0" y="10" width="200" height="40" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="36" font-family="system-ui, sans-serif" font-size="14" fill="#0f172a">任意运营商</text>
    <path d="M170 25 L180 35 L190 25" fill="none" stroke="#94a3b8" stroke-width="2"/>
  </g>

  <!-- Virtual phone number card -->
  <rect x="100" y="290" width="500" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="100" y="290" width="500" height="45" rx="12" fill="#f0fdfa"/>
  <rect x="100" y="320" width="500" height="15" fill="#f0fdfa"/>
  <circle cx="130" cy="312" r="14" fill="#0d9488" opacity="0.1"/>
  <text x="150" y="318" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0d9488">虚拟号码已就绪</text>
  <text x="120" y="365" font-family="monospace" font-size="28" font-weight="600" fill="#0f172a">+1 415 555 0127</text>
  <text x="120" y="395" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">🇺🇸 United States · Verizon · 有效期 20 分钟</text>
  <rect x="420" y="370" width="80" height="32" rx="6" fill="#0d9488"/>
  <text x="460" y="391" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">复制号码</text>

  <!-- SMS message card -->
  <rect x="620" y="290" width="500" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="620" y="290" width="500" height="45" rx="12" fill="#ecfdf5"/>
  <rect x="620" y="320" width="500" height="15" fill="#ecfdf5"/>
  <circle cx="650" cy="312" r="14" fill="#059669" opacity="0.1"/>
  <text x="670" y="318" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#059669">✓ 验证码已收到</text>
  <text x="640" y="365" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">来自 Google</text>
  <text x="640" y="395" font-family="system-ui, sans-serif" font-size="14" fill="#0f172a">您的 Google 验证码是 <tspan font-weight="600" fill="#059669">847291</tspan>。请勿与他人分享。</text>
  <rect x="920" y="370" width="80" height="32" rx="6" fill="#059669"/>
  <text x="960" y="391" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">复制验证码</text>

  <!-- Footer stats -->
  <g transform="translate(100, 470)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#f8fafc"/>
    <text x="90" y="28" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#0d9488" text-anchor="middle">12.8M+</text>
    <text x="90" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">成功接码</text>
  </g>
  <g transform="translate(300, 470)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#f8fafc"/>
    <text x="90" y="28" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#0d9488" text-anchor="middle">95%+</text>
    <text x="90" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">送达成功率</text>
  </g>
  <g transform="translate(500, 470)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#f8fafc"/>
    <text x="90" y="28" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#0d9488" text-anchor="middle">10秒</text>
    <text x="90" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">平均到达时间</text>
  </g>
  <g transform="translate(700, 470)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#f8fafc"/>
    <text x="90" y="28" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#0d9488" text-anchor="middle">¥0.1起</text>
    <text x="90" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">每条短信</text>
  </g>
</svg>