<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#faf5ff" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">虚拟身份工具对比 — 为什么选择我们</text>

  <!-- Free column -->
  <rect x="60" y="70" width="310" height="350" rx="14" fill="white" filter="url(#sh)"/>
  <rect x="60" y="70" width="310" height="50" rx="14" fill="#fef2f2"/>
  <rect x="60" y="105" width="310" height="15" fill="#fef2f2"/>
  <circle cx="100" cy="95" r="16" fill="#fca5a5" opacity="0.3"/>
  <text x="100" y="101" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">🆓</text>
  <text x="130" y="102" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#991b1b">普通生成器</text>

  <!-- Free items -->
  <g transform="translate(80, 140)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">格式单一固定</text>
  </g>
  <g transform="translate(80, 170)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">仅支持少数国家</text>
  </g>
  <g transform="translate(80, 200)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">数据不够真实</text>
  </g>
  <g transform="translate(80, 230)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">无法批量生成</text>
  </g>
  <g transform="translate(80, 260)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">缺少导出功能</text>
  </g>
  <g transform="translate(80, 290)">
    <circle cx="8" cy="0" r="4" fill="#fca5a5"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">界面简陋难用</text>
  </g>

  <!-- Free success rate bar -->
  <text x="215" y="340" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">用户满意度</text>
  <rect x="90" y="350" width="240" height="16" rx="8" fill="#fee2e2"/>
  <rect x="90" y="350" width="72" height="16" rx="8" fill="url(#g2)"/>
  <text x="215" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="middle">~30%</text>

  <!-- Paid column (us) -->
  <rect x="430" y="70" width="310" height="350" rx="14" fill="white" filter="url(#sh)" stroke="#c4b5fd" stroke-width="2"/>
  <rect x="430" y="70" width="310" height="50" rx="14" fill="#f5f3ff"/>
  <rect x="430" y="105" width="310" height="15" fill="#f5f3ff"/>
  <circle cx="470" cy="95" r="16" fill="#a78bfa" opacity="0.3"/>
  <text x="470" y="101" font-family="system-ui, sans-serif" font-size="16" text-anchor="middle">⭐</text>
  <text x="500" y="102" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#5b21b6">专业生成器（推荐）</text>

  <!-- Paid items -->
  <g transform="translate(450, 140)">
    <circle cx="8" cy="0" r="4" fill="#a78bfa"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">50+ 国家真实格式</text>
  </g>
  <g transform="translate(450, 170)">
    <circle cx="8" cy="0" r="4" fill="#a78bfa"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">10+ 身份数据类型</text>
  </g>
  <g transform="translate(450, 200)">
    <circle cx="8" cy="0" r="4" fill="#a78bfa"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">符合本地真实规范</text>
  </g>
  <g transform="translate(450, 230)">
    <circle cx="8" cy="0" r="4" fill="#a78bfa"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">支持批量一键生成</text>
  </g>
  <g transform="translate(450, 260)">
    <circle cx="8" cy="0" r="4" fill="#a78bfa"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">JSON/CSV/TXT 导出</text>
  </g>
  <g transform="translate(450, 290)">
    <circle cx="8" cy="0" r="4" fill="#a78bfa"/><text x="22" y="5" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a" font-weight="500">现代界面易操作</text>
  </g>

  <!-- Paid success rate bar -->
  <text x="585" y="340" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">用户满意度</text>
  <rect x="460" y="350" width="240" height="16" rx="8" fill="#ede9fe"/>
  <rect x="460" y="350" width="216" height="16" rx="8" fill="url(#g1)"/>
  <text x="585" y="390" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1" text-anchor="middle">90%+</text>
</svg>