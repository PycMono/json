<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <text x="400" y="35" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Proxy Protocol Comparison — Latency &amp; Uptime Distribution</text>

  <!-- Chart: Protocol Latency Box Plot -->
  <text x="80" y="70" fill="#065f46" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Average Latency by Protocol (ms)</text>

  <!-- Y axis labels -->
  <text x="55" y="110" text-anchor="end" fill="#6b7280" font-family="system-ui,sans-serif" font-size="10">2000</text>
  <text x="55" y="150" text-anchor="end" fill="#6b7280" font-family="system-ui,sans-serif" font-size="10">1500</text>
  <text x="55" y="190" text-anchor="end" fill="#6b7280" font-family="system-ui,sans-serif" font-size="10">1000</text>
  <text x="55" y="230" text-anchor="end" fill="#6b7280" font-family="system-ui,sans-serif" font-size="10">500</text>
  <text x="55" y="260" text-anchor="end" fill="#6b7280" font-family="system-ui,sans-serif" font-size="10">0</text>

  <!-- Grid lines -->
  <line x1="65" y1="105" x2="750" y2="105" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="65" y1="145" x2="750" y2="145" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="65" y1="185" x2="750" y2="185" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="65" y1="225" x2="750" y2="225" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="65" y1="257" x2="750" y2="257" stroke="#94a3b8" stroke-width="1"/>

  <!-- HTTP bar -->
  <rect x="110" y="207" width="100" height="50" rx="4" fill="#dbeafe"/>
  <rect x="110" y="207" width="100" height="50" rx="4" fill="#2563eb" opacity="0.7"/>
  <text x="160" y="200" text-anchor="middle" fill="#2563eb" font-family="system-ui,sans-serif" font-size="12" font-weight="700">380ms</text>
  <text x="160" y="275" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11" font-weight="600">HTTP</text>

  <!-- HTTPS bar -->
  <rect x="260" y="197" width="100" height="60" rx="4" fill="#dcfce7"/>
  <rect x="260" y="197" width="100" height="60" rx="4" fill="#16a34a" opacity="0.7"/>
  <text x="310" y="190" text-anchor="middle" fill="#16a34a" font-family="system-ui,sans-serif" font-size="12" font-weight="700">320ms</text>
  <text x="310" y="275" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11" font-weight="600">HTTPS</text>

  <!-- SOCKS4 bar -->
  <rect x="410" y="175" width="100" height="82" rx="4" fill="#f3e8ff"/>
  <rect x="410" y="175" width="100" height="82" rx="4" fill="#a855f7" opacity="0.7"/>
  <text x="460" y="168" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="12" font-weight="700">680ms</text>
  <text x="460" y="275" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11" font-weight="600">SOCKS4</text>

  <!-- SOCKS5 bar -->
  <rect x="560" y="183" width="100" height="74" rx="4" fill="#fef9c3"/>
  <rect x="560" y="183" width="100" height="74" rx="4" fill="#d97706" opacity="0.7"/>
  <text x="610" y="176" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="12" font-weight="700">550ms</text>
  <text x="610" y="275" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11" font-weight="600">SOCKS5</text>

  <!-- Bottom section: Anonymity Distribution -->
  <text x="400" y="310" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Anonymity Level Distribution</text>

  <!-- Stacked bar -->
  <rect x="120" y="330" width="560" height="36" rx="18" fill="#e2e8f0"/>
  <!-- Transparent 15% -->
  <rect x="120" y="330" width="84" height="36" rx="18" fill="#6b7280"/>
  <rect x="180" y="330" width="24" height="36" fill="#6b7280"/>
  <text x="162" y="352" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="600">15%</text>
  <!-- Anonymous 55% -->
  <rect x="204" y="330" width="308" height="36" fill="#f59e0b"/>
  <text x="358" y="352" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="600">55% Anonymous</text>
  <!-- Elite 30% -->
  <rect x="512" y="330" width="168" height="36" rx="18" fill="#16a34a"/>
  <rect x="512" y="330" width="20" height="36" fill="#16a34a"/>
  <text x="596" y="352" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="11" font-weight="600">30% Elite</text>

  <!-- Legend -->
  <rect x="160" y="385" width="12" height="12" rx="3" fill="#6b7280"/>
  <text x="178" y="395" fill="#475569" font-family="system-ui,sans-serif" font-size="11">Transparent</text>
  <rect x="310" y="385" width="12" height="12" rx="3" fill="#f59e0b"/>
  <text x="328" y="395" fill="#475569" font-family="system-ui,sans-serif" font-size="11">Anonymous</text>
  <rect x="460" y="385" width="12" height="12" rx="3" fill="#16a34a"/>
  <text x="478" y="395" fill="#475569" font-family="system-ui,sans-serif" font-size="11">Elite / High Anonymity</text>

  <!-- Bottom note -->
  <text x="400" y="430" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Data based on 10,000+ tested proxies · Updated every 30 minutes</text>
</svg>
