<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#ecfdf5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  <!-- Title -->
  <text x="400" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#0f172a" text-anchor="middle">Types of Plagiarism We Detect</text>
  <text x="400" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Comprehensive detection of all plagiarism forms</text>
  <!-- Row 1 -->
  <!-- Direct Plagiarism -->
  <rect x="40" y="95" width="360" height="130" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <rect x="55" y="108" width="36" height="36" rx="8" fill="#ef4444" opacity="0.12"/>
  <text x="73" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="16" text-anchor="middle" fill="#ef4444" font-weight="700">D</text>
  <text x="105" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b">Direct Copying</text>
  <text x="55" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Word-for-word copying without</text>
  <text x="55" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">quotation marks or citation</text>
  <rect x="55" y="190" width="50" height="16" rx="8" fill="#ef4444" opacity="0.08"/>
  <text x="80" y="201" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">Severe</text>
  <!-- Mosaic Plagiarism -->
  <rect x="400" y="95" width="360" height="130" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <rect x="415" y="108" width="36" height="36" rx="8" fill="#f97316" opacity="0.12"/>
  <text x="433" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="16" text-anchor="middle" fill="#f97316" font-weight="700">M</text>
  <text x="465" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b">Mosaic/Cobble</text>
  <text x="415" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Piecing together phrases from</text>
  <text x="415" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">multiple sources without credit</text>
  <rect x="415" y="190" width="55" height="16" rx="8" fill="#f97316" opacity="0.08"/>
  <text x="442" y="201" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ea580c" text-anchor="middle">High Risk</text>
  <!-- Row 2 -->
  <!-- Self Plagiarism -->
  <rect x="40" y="245" width="240" height="130" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <rect x="55" y="258" width="36" height="36" rx="8" fill="#f59e0b" opacity="0.12"/>
  <text x="73" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="16" text-anchor="middle" fill="#f59e0b" font-weight="700">S</text>
  <text x="105" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b">Self-Plagiarism</text>
  <text x="55" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Reusing your own previous</text>
  <text x="55" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">work without proper citation</text>
  <rect x="55" y="350" width="50" height="16" rx="8" fill="#f59e0b" opacity="0.08"/>
  <text x="80" y="361" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#d97706" text-anchor="middle">Medium</text>
  <!-- Accidental Plagiarism -->
  <rect x="280" y="245" width="240" height="130" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <rect x="295" y="258" width="36" height="36" rx="8" fill="#6366f1" opacity="0.12"/>
  <text x="313" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="16" text-anchor="middle" fill="#6366f1" font-weight="700">A</text>
  <text x="345" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b">Accidental</text>
  <text x="295" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Unintentional failure to cite</text>
  <text x="295" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">sources or misattribution</text>
  <rect x="295" y="350" width="50" height="16" rx="8" fill="#6366f1" opacity="0.08"/>
  <text x="320" y="361" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#4f46e5" text-anchor="middle">Low</text>
  <!-- AI Plagiarism -->
  <rect x="520" y="245" width="240" height="130" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <rect x="535" y="258" width="36" height="36" rx="8" fill="#ec4899" opacity="0.12"/>
  <text x="553" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="16" text-anchor="middle" fill="#ec4899" font-weight="700">AI</text>
  <text x="585" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b">AI-Generated</text>
  <text x="535" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Content created by AI tools</text>
  <text x="535" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">presented as original work</text>
  <rect x="535" y="350" width="55" height="16" rx="8" fill="#ec4899" opacity="0.08"/>
  <text x="562" y="361" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#db2777" text-anchor="middle">Emerging</text>
</svg>