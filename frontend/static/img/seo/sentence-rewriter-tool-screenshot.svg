<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f9fafb"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#10b981"/>
  <text x="30" y="38" fill="#fff" font-size="20" font-weight="bold">AI Sentence Rewriter — json</text>

  <!-- Main Content Area -->
  <rect x="20" y="80" width="560" height="500" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Input Panel Title -->
  <text x="40" y="110" fill="#111827" font-size="18" font-weight="bold">Rewrite Your Sentences</text>

  <!-- Text Input -->
  <rect x="40" y="140" width="520" height="180" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="55" y="170" fill="#6b7280" font-size="14">Enter text to rewrite...</text>

  <!-- Tone Dropdown -->
  <rect x="40" y="340" width="250" height="40" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="55" y="365" fill="#111827" font-size="13">Tone: Neutral</text>
  <text x="270" y="365" fill="#6b7280" font-size="13">▼</text>

  <!-- Purpose Dropdown -->
  <rect x="310" y="340" width="250" height="40" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="325" y="365" fill="#111827" font-size="13">Purpose: Clarity</text>
  <text x="540" y="365" fill="#6b7280" font-size="13">▼</text>

  <!-- Rewrite Button -->
  <rect x="40" y="400" width="520" height="50" rx="8" fill="#10b981"/>
  <text x="300" y="432" fill="#fff" font-size="16" font-weight="bold" text-anchor="middle">↻ Rewrite Sentence</text>

  <!-- Output Panel -->
  <rect x="600" y="80" width="580" height="500" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Output Title -->
  <text x="620" y="110" fill="#111827" font-size="18" font-weight="bold">Rewritten Result</text>

  <!-- Copy button -->
  <rect x="1000" y="95" width="80" height="30" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="1040" y="115" fill="#10b981" font-size="11" text-anchor="middle">📋 Copy</text>

  <!-- Output content preview -->
  <rect x="620" y="140" width="540" height="350" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="640" y="175" fill="#111827" font-size="14" font-weight="bold">Original:</text>
  <text x="640" y="200" fill="#6b7280" font-size="12">The quick brown fox jumps over the lazy dog.</text>
  <text x="640" y="240" fill="#111827" font-size="14" font-weight="bold">Rewritten:</text>
  <text x="640" y="265" fill="#10b981" font-size="12">A speedy tan fox vaulted effortlessly above a sleepy canine companion.</text>
  <text x="640" y="305" fill="#111827" font-size="14" font-weight="bold">Original:</text>
  <text x="640" y="330" fill="#6b7280" font-size="12">This is a very good product.</text>
  <text x="640" y="360" fill="#111827" font-size="14" font-weight="bold">Rewritten:</text>
  <text x="640" y="385" fill="#10b981" font-size="12">This product is exceptionally outstanding.</text>
  <text x="640" y="420" fill="#111827" font-size="14" font-weight="bold">Original:</text>
  <text x="640" y="445" fill="#6b7280" font-size="12">I think this is important.</text>
  <text x="640" y="470" fill="#111827" font-size="14" font-weight="bold">Rewritten:</text>
  <text x="640" y="495" fill="#10b981" font-size="12">This matter is of paramount significance.</text>

  <!-- Word count badge -->
  <rect x="1100" y="160" width="60" height="25" rx="4" fill="#10b981"/>
  <text x="1130" y="178" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">3 rewrites</text>
</svg>
