<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#accent)"/>
  <!-- Title -->
  <text x="400" y="44" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e0e7ff" text-anchor="middle">How Our Anonymous Proxy Works</text>
  <text x="400" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">3 simple steps to browse privately and securely</text>
  <!-- Step 1 -->
  <rect x="40" y="90" width="220" height="280" rx="14" fill="url(#card-bg)" stroke="#334155"/>
  <rect x="60" y="108" width="48" height="48" rx="24" fill="#4f46e5" opacity="0.2"/>
  <text x="84" y="139" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#818cf8" text-anchor="middle" font-weight="800">1</text>
  <text x="130" y="129" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0e7ff">Enter URL</text>
  <text x="60" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">Type any website address</text>
  <text x="60" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">into the proxy bar</text>
  <!-- Mini URL bar illustration -->
  <rect x="60" y="215" width="190" height="36" rx="8" fill="#0f172a" stroke="#334155"/>
  <circle cx="80" cy="233" r="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="92" y="237" font-family="monospace" font-size="11" fill="#94a3b8">https://example.com</text>
  <!-- Arrow down -->
  <path d="M150 270 L150 320" stroke="#818cf8" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="60" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">✓ Select server node</text>
  <text x="60" y="367" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">✓ Set privacy options</text>
  <!-- Step 2 -->
  <rect x="290" y="90" width="220" height="280" rx="14" fill="url(#card-bg)" stroke="#334155"/>
  <rect x="310" y="108" width="48" height="48" rx="24" fill="#4f46e5" opacity="0.2"/>
  <text x="334" y="139" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#818cf8" text-anchor="middle" font-weight="800">2</text>
  <text x="380" y="129" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0e7ff">Proxy Routing</text>
  <text x="310" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">Traffic is routed through</text>
  <text x="310" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">encrypted proxy servers</text>
  <!-- Traffic flow illustration -->
  <circle cx="340" cy="240" r="22" fill="#1e3a5f" stroke="#4f46e5" stroke-width="2"/>
  <text x="340" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#818cf8" text-anchor="middle">You</text>
  <line x1="365" y1="233" x2="420" y2="233" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="392" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#818cf8" text-anchor="middle">🔒</text>
  <circle cx="450" cy="233" r="18" fill="#1e3a5f" stroke="#818cf8" stroke-width="2"/>
  <text x="450" y="237" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#818cf8" text-anchor="middle">Proxy</text>
  <line x1="470" y1="233" x2="510" y2="233" stroke="#818cf8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="310" y="280" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">✓ AES-256 encryption</text>
  <text x="310" y="297" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">✓ IP address hidden</text>
  <text x="310" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">✓ No-logs policy</text>
  <!-- Step 3 -->
  <rect x="540" y="90" width="220" height="280" rx="14" fill="url(#card-bg)" stroke="#334155"/>
  <rect x="560" y="108" width="48" height="48" rx="24" fill="#4f46e5" opacity="0.2"/>
  <text x="584" y="139" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#818cf8" text-anchor="middle" font-weight="800">3</text>
  <text x="630" y="129" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0e7ff">Browse Freely</text>
  <text x="560" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">Access websites privately</text>
  <text x="560" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#94a3b8">through your browser</text>
  <!-- Browser mockup -->
  <rect x="565" y="210" width="180" height="110" rx="8" fill="#0f172a" stroke="#334155"/>
  <rect x="565" y="210" width="180" height="24" rx="8" fill="#1e293b"/>
  <circle cx="579" cy="222" r="4" fill="#ef4444"/>
  <circle cx="591" cy="222" r="4" fill="#f59e0b"/>
  <circle cx="603" cy="222" r="4" fill="#22c55e"/>
  <rect x="610" y="217" width="120" height="10" rx="4" fill="#334155"/>
  <text x="650" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">🛡️ proxied</text>
  <rect x="575" y="244" width="160" height="60" rx="4" fill="#1e293b"/>
  <text x="655" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#818cf8" text-anchor="middle">Page loaded</text>
  <text x="655" y="284" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">via anon proxy ✓</text>
  <text x="560" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">✓ Anonymous browsing</text>
  <text x="560" y="357" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">✓ Ad-block enabled</text>
</svg>