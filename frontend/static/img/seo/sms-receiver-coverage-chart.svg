<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#f8fffe" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">全球覆盖 — 180+ 国家 · 700+ 平台</text>

  <!-- Simplified world map background -->
  <ellipse cx="400" cy="240" rx="280" ry="160" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>

  <!-- Region highlights -->
  <!-- North America -->
  <ellipse cx="270" cy="195" rx="55" ry="40" fill="#0d9488" opacity="0.15"/>
  <text x="270" y="198" font-family="system-ui, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">🇺🇸 🇨🇦 🇲🇽</text>

  <!-- South America -->
  <ellipse cx="310" cy="310" rx="40" ry="35" fill="#14b8a6" opacity="0.15"/>
  <text x="310" y="313" font-family="system-ui, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">🇧🇷 🇦🇷</text>

  <!-- Europe -->
  <ellipse cx="420" cy="180" rx="50" ry="35" fill="#0d9488" opacity="0.15"/>
  <text x="420" y="183" font-family="system-ui, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">🇬🇧 🇩🇪 🇫🇷</text>

  <!-- Russia -->
  <ellipse cx="510" cy="165" rx="60" ry="25" fill="#14b8a6" opacity="0.15"/>
  <text x="510" y="168" font-family="system-ui, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">🇷🇺</text>

  <!-- Africa -->
  <ellipse cx="430" cy="280" rx="35" ry="40" fill="#14b8a6" opacity="0.12"/>
  <text x="430" y="283" font-family="system-ui, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">🇳🇬</text>

  <!-- Asia -->
  <ellipse cx="540" cy="210" rx="65" ry="45" fill="#0d9488" opacity="0.15"/>
  <text x="540" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">🇮🇳 🇯🇵 🇰🇷</text>
  <text x="540" y="225" font-family="system-ui, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">🇨🇳 🇮🇩</text>

  <!-- Oceania -->
  <ellipse cx="560" cy="310" rx="30" ry="20" fill="#14b8a6" opacity="0.12"/>
  <text x="560" y="313" font-family="system-ui, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">🇦🇺</text>

  <!-- Stats cards at bottom -->
  <g transform="translate(50, 400)">
    <rect x="0" y="0" width="160" height="65" rx="10" fill="white" filter="url(#sh)"/>
    <text x="80" y="28" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#0d9488" text-anchor="middle">180+</text>
    <text x="80" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">覆盖国家</text>
  </g>
  <g transform="translate(230, 400)">
    <rect x="0" y="0" width="160" height="65" rx="10" fill="white" filter="url(#sh)"/>
    <text x="80" y="28" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#059669" text-anchor="middle">700+</text>
    <text x="80" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">支持平台</text>
  </g>
  <g transform="translate(410, 400)">
    <rect x="0" y="0" width="160" height="65" rx="10" fill="white" filter="url(#sh)"/>
    <text x="80" y="28" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#0d9488" text-anchor="middle">3,400+</text>
    <text x="80" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">在线号码</text>
  </g>
  <g transform="translate(590, 400)">
    <rect x="0" y="0" width="160" height="65" rx="10" fill="white" filter="url(#sh)"/>
    <text x="80" y="28" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#059669" text-anchor="middle">99.9%</text>
    <text x="80" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">服务可用性</text>
  </g>

  <!-- Service logos row -->
  <g transform="translate(80, 370)">
    <text x="320" y="0" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Google · WhatsApp · Telegram · Facebook · TikTok · Instagram · Twitter · Amazon · Discord · LINE</text>
  </g>
</svg>