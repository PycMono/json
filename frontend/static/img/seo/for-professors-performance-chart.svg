<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f9fafb" rx="16"/>
  <text x="400" y="40" fill="#111827" font-size="22" font-weight="bold" text-anchor="middle">Performance Metrics — AI Humanizer for Professors</text>
  <!-- Bar chart -->
  <rect x="60" y="80" width="680" height="200" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="400" y="105" fill="#111827" font-size="16" font-weight="bold" text-anchor="middle">Detection Bypass Rate</text>
  <!-- Y-axis labels -->
  <text x="80" y="200" fill="#6b7280" font-size="11" text-anchor="middle">100%</text>
  <text x="80" y="155" fill="#6b7280" font-size="11" text-anchor="middle">75%</text>
  <text x="80" y="110" fill="#6b7280" font-size="11" text-anchor="middle">50%</text>
  <text x="80" y="180" fill="#6b7280" font-size="11" text-anchor="middle">25%</text>
  <text x="80" y="235" fill="#6b7280" font-size="11" text-anchor="middle">0%</text>
  <!-- Bars -->
  <rect x="120" y="110" width="60" height="128" fill="#8b5cf6" rx="4"/>
  <text x="150" y="100" fill="#111827" font-size="10" text-anchor="middle">96%</text>
  <text x="150" y="250" fill="#6b7280" font-size="10" text-anchor="middle">GPTZero</text>
  <rect x="220" y="125" width="60" height="113" fill="#a78bfa" rx="4"/>
  <text x="250" y="115" fill="#111827" font-size="10" text-anchor="middle">89%</text>
  <text x="250" y="250" fill="#6b7280" font-size="10" text-anchor="middle">Turnitin</text>
  <rect x="320" y="118" width="60" height="120" fill="#c4b5fd" rx="4"/>
  <text x="350" y="108" fill="#111827" font-size="10" text-anchor="middle">94%</text>
  <text x="350" y="250" fill="#6b7280" font-size="10" text-anchor="middle">Copyleaks</text>
  <rect x="420" y="105" width="60" height="133" fill="#8b5cf6" rx="4"/>
  <text x="450" y="95" fill="#111827" font-size="10" text-anchor="middle">97%</text>
  <text x="450" y="250" fill="#6b7280" font-size="10" text-anchor="middle">Originality.ai</text>
  <rect x="520" y="130" width="60" height="108" fill="#a78bfa" rx="4"/>
  <text x="550" y="120" fill="#111827" font-size="10" text-anchor="middle">85%</text>
  <text x="550" y="250" fill="#6b7280" font-size="10" text-anchor="middle">Winston AI</text>
  <rect x="620" y="115" width="60" height="123" fill="#c4b5fd" rx="4"/>
  <text x="650" y="105" fill="#111827" font-size="10" text-anchor="middle">95%</text>
  <text x="650" y="250" fill="#6b7280" font-size="10" text-anchor="middle">Writer</text>
  <!-- Stats cards -->
  <rect x="60" y="300" width="200" height="120" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="160" y="330" fill="#8b5cf6" font-size="32" font-weight="bold" text-anchor="middle">3.2s</text>
  <text x="160" y="360" fill="#111827" font-size="14" text-anchor="middle">Average Processing Time</text>
  <text x="160" y="390" fill="#6b7280" font-size="11" text-anchor="middle">For 1000-word documents</text>
  <rect x="300" y="300" width="200" height="120" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="400" y="330" fill="#10b981" font-size="32" font-weight="bold" text-anchor="middle">10K+</text>
  <text x="400" y="360" fill="#111827" font-size="14" text-anchor="middle">Words Per Request</text>
  <text x="400" y="390" fill="#6b7280" font-size="11" text-anchor="middle">No length limitations</text>
  <rect x="540" y="300" width="200" height="120" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="640" y="330" fill="#f59e0b" font-size="32" font-weight="bold" text-anchor="middle">99.2%</text>
  <text x="640" y="360" fill="#111827" font-size="14" text-anchor="middle">Average Human Score</text>
  <text x="640" y="390" fill="#6b7280" font-size="11" text-anchor="middle">Post-humanization</text>
</svg>
