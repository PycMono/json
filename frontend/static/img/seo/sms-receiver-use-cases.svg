<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#f8fffe" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a" text-anchor="middle">在线短信接码器的使用场景</text>

  <!-- Center hub -->
  <circle cx="400" cy="260" r="55" fill="url(#g1)" filter="url(#sh)"/>
  <text x="400" y="253" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">SMS</text>
  <text x="400" y="273" font-family="system-ui, sans-serif" font-size="12" fill="#ccfbf1" text-anchor="middle">Receiver</text>

  <!-- Use case 1: Account verification -->
  <line x1="358" y1="225" x2="185" y2="140" stroke="#99f6e4" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="60" y="95" width="190" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="100" cy="130" r="22" fill="#f0fdfa"/>
  <text x="100" y="136" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle">📱</text>
  <text x="165" y="130" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">账号验证</text>
  <text x="155" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">注册 WhatsApp、Telegram</text>
  <text x="155" y="172" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Google、TikTok 等平台</text>

  <!-- Use case 2: Privacy protection -->
  <line x1="442" y1="225" x2="615" y2="140" stroke="#99f6e4" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="550" y="95" width="190" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="590" cy="130" r="22" fill="#f0fdfa"/>
  <text x="590" y="136" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle">🔒</text>
  <text x="655" y="130" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">隐私保护</text>
  <text x="645" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">不暴露真实手机号码</text>
  <text x="645" y="172" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">防止垃圾短信和骚扰</text>

  <!-- Use case 3: International services -->
  <line x1="358" y1="295" x2="185" y2="380" stroke="#99f6e4" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="60" y="340" width="190" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="100" cy="375" r="22" fill="#f0fdfa"/>
  <text x="100" y="381" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle">🌍</text>
  <text x="165" y="375" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">国际服务</text>
  <text x="155" y="400" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">访问地区限制内容</text>
  <text x="155" y="417" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">180+ 国家号码覆盖</text>

  <!-- Use case 4: Business testing -->
  <line x1="442" y1="295" x2="615" y2="380" stroke="#99f6e4" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="550" y="340" width="190" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="590" cy="375" r="22" fill="#f0fdfa"/>
  <text x="590" y="381" font-family="system-ui, sans-serif" font-size="22" text-anchor="middle">💼</text>
  <text x="655" y="375" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">企业测试</text>
  <text x="645" y="400" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">QA 短信投递测试</text>
  <text x="645" y="417" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">批量验证 &amp; API 集成</text>
</svg>