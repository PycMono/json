<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f9fafb"/>
  <text x="400" y="40" fill="#111827" font-size="24" font-weight="bold" text-anchor="middle">Who Uses AI Essay Writer?</text>

  <!-- Students -->
  <g transform="translate(100, 100)">
    <circle cx="80" cy="80" r="70" fill="#6366f1" opacity="0.1"/>
    <text x="80" y="80" text-anchor="middle" fill="#6366f1" font-size="50">🎓</text>
    <text x="80" y="180" text-anchor="middle" fill="#111827" font-size="18" font-weight="bold">Students</text>
    <text x="80" y="200" text-anchor="middle" fill="#6b7280" font-size="12">College &amp; University</text>
    <text x="80" y="215" text-anchor="middle" fill="#6b7280" font-size="12">Assignments, Papers</text>
  </g>

  <!-- Researchers -->
  <g transform="translate(280, 100)">
    <circle cx="80" cy="80" r="70" fill="#8b5cf6" opacity="0.1"/>
    <text x="80" y="80" text-anchor="middle" fill="#8b5cf6" font-size="50">🔬</text>
    <text x="80" y="180" text-anchor="middle" fill="#111827" font-size="18" font-weight="bold">Researchers</text>
    <text x="80" y="200" text-anchor="middle" fill="#6b7280" font-size="12">Academic Papers</text>
    <text x="80" y="215" text-anchor="middle" fill="#6b7280" font-size="12">Literature Reviews</text>
  </g>

  <!-- Teachers -->
  <g transform="translate(460, 100)">
    <circle cx="80" cy="80" r="70" fill="#10b981" opacity="0.1"/>
    <text x="80" y="80" text-anchor="middle" fill="#10b981" font-size="50">👩‍🏫</text>
    <text x="80" y="180" text-anchor="middle" fill="#111827" font-size="18" font-weight="bold">Teachers</text>
    <text x="80" y="200" text-anchor="middle" fill="#6b7280" font-size="12">Lesson Materials</text>
    <text x="80" y="215" text-anchor="middle" fill="#6b7280" font-size="12">Sample Essays</text>
  </g>

  <!-- Professionals -->
  <g transform="translate(640, 100)">
    <circle cx="80" cy="80" r="70" fill="#f59e0b" opacity="0.1"/>
    <text x="80" y="80" text-anchor="middle" fill="#f59e0b" font-size="50">💼</text>
    <text x="80" y="180" text-anchor="middle" fill="#111827" font-size="18" font-weight="bold">Professionals</text>
    <text x="80" y="200" text-anchor="middle" fill="#6b7280" font-size="12">Reports, Proposals</text>
    <text x="80" y="215" text-anchor="middle" fill="#6b7280" font-size="12">Business Writing</text>
  </g>

  <!-- Bottom section - Essay types -->
  <rect x="50" y="280" width="700" height="280" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="400" y="310" fill="#111827" font-size="18" font-weight="bold" text-anchor="middle">Supported Essay Types</text>

  <!-- Essay type icons row -->
  <g transform="translate(80, 340)">
    <rect width="120" height="100" rx="8" fill="#6366f1" opacity="0.1"/>
    <text x="60" y="40" text-anchor="middle" fill="#6366f1" font-size="30">⚖️</text>
    <text x="60" y="70" text-anchor="middle" fill="#111827" font-size="12" font-weight="bold">Argumentative</text>
    <text x="60" y="85" text-anchor="middle" fill="#6b7280" font-size="10">Persuade</text>
  </g>

  <g transform="translate(220, 340)">
    <rect width="120" height="100" rx="8" fill="#8b5cf6" opacity="0.1"/>
    <text x="60" y="40" text-anchor="middle" fill="#8b5cf6" font-size="30">📖</text>
    <text x="60" y="70" text-anchor="middle" fill="#111827" font-size="12" font-weight="bold">Expository</text>
    <text x="60" y="85" text-anchor="middle" fill="#6b7280" font-size="10">Explain</text>
  </g>

  <g transform="translate(360, 340)">
    <rect width="120" height="100" rx="8" fill="#10b981" opacity="0.1"/>
    <text x="60" y="40" text-anchor="middle" fill="#10b981" font-size="30">📝</text>
    <text x="60" y="70" text-anchor="middle" fill="#111827" font-size="12" font-weight="bold">Narrative</text>
    <text x="60" y="85" text-anchor="middle" fill="#6b7280" font-size="10">Story</text>
  </g>

  <g transform="translate(500, 340)">
    <rect width="120" height="100" rx="8" fill="#f59e0b" opacity="0.1"/>
    <text x="60" y="40" text-anchor="middle" fill="#f59e0b" font-size="30">🎨</text>
    <text x="60" y="70" text-anchor="middle" fill="#111827" font-size="12" font-weight="bold">Descriptive</text>
    <text x="60" y="85" text-anchor="middle" fill="#6b7280" font-size="10">Describe</text>
  </g>

  <g transform="translate(640, 340)">
    <rect width="120" height="100" rx="8" fill="#ef4444" opacity="0.1"/>
    <text x="60" y="40" text-anchor="middle" fill="#ef4444" font-size="30">🤝</text>
    <text x="60" y="70" text-anchor="middle" fill="#111827" font-size="12" font-weight="bold">Compare</text>
    <text x="60" y="85" text-anchor="middle" fill="#6b7280" font-size="10">Analyze</text>
  </g>
</svg>