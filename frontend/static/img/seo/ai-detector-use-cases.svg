  <!-- HR -->
  <rect x="40" y="245" width="170" height="130" rx="12" fill="white" stroke="#e2e8f0"/>
  <rect x="55" y="258" width="36" height="36" rx="8" fill="#ec4899" opacity="0.12"/>
  <text x="73" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="16" text-anchor="middle" fill="#ec4899" font-weight="700">HR</text>
