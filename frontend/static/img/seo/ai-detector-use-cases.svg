  <text x="400" y="70" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Professionals across industries rely on AI detection for authenticity</text>
  <!-- Row 1 -->
  <!-- Educators -->
  <rect x="40" y="95" width="170" height="130" rx="12" fill="white" stroke="#e2e8f0"/>
  <rect x="55" y="108" width="36" height="36" rx="8" fill="#6366f1" opacity="0.12"/>
  <text x="73" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="16" text-anchor="middle" fill="#6366f1" font-weight="700">E</text>
  <text x="105" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b">Educators</text>
  <text x="55" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Verify student</text>
