  <text x="240" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">authenticity for</text>
  <text x="240" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">compliance.</text>
