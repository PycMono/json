  <text x="272" y="361" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#7c3aed" text-anchor="middle">Compliance</text>
  <!-- SEO -->
  <rect x="410" y="245" width="170" height="130" rx="12" fill="white" stroke="#e2e8f0"/>
  <rect x="425" y="258" width="36" height="36" rx="8" fill="#f97316" opacity="0.12"/>
