  <text x="425" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Ensure content</text>
  <text x="425" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">quality for search</text>
  <text x="425" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">engine ranking.</text>
  <rect x="425" y="350" width="55" height="16" rx="8" fill="#f97316" opacity="0.08"/>
  <text x="452" y="361" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ea580c" text-anchor="middle">Marketing</text>
  <!-- Business -->
  <rect x="595" y="245" width="170" height="130" rx="12" fill="white" stroke="#e2e8f0"/>
  <rect x="610" y="258" width="36" height="36" rx="8" fill="#14b8a6" opacity="0.12"/>
  <text x="628" y="282" font-family="system-ui,-apple-system,sans-serif" font-size="16" text-anchor="middle" fill="#14b8a6" font-weight="700">B</text>
  <text x="660" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#1e293b">Business</text>
  <text x="610" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">Verify agency</text>
  <text x="610" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">content meets</text>
  <text x="610" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b">authenticity.</text>
  <rect x="610" y="350" width="60" height="16" rx="8" fill="#14b8a6" opacity="0.08"/>
  <text x="640" y="361" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#0d9488" text-anchor="middle">Enterprise</text>
