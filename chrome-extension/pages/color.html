<!DOCTYPE html>

<head>

  <title>Color Tools - ToolBoxNova</title>
  <link rel="stylesheet" href="shared.css">

    Color tools — single-page app managed by color-tools.js.
    Requires .ct-page element with data-tool and data-lang attributes.
  -->

    <div style="text-align:center;padding:40px 20px;">
      <p style="font-size:16px;color:#666;">Loading Color Tools...</p>
    </div>
  </div>

  <script src="../static/vendor/chroma.min.js"></script>
